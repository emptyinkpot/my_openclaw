<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>白梦写作网 - 自动化控制台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }
    
    .header h1 { font-size: 24px; margin-bottom: 5px; }
    .header p { opacity: 0.9; font-size: 14px; }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
    }
    
    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
    }
    
    .sidebar {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      height: fit-content;
    }
    
    .sidebar h3 {
      font-size: 16px;
      margin-bottom: 15px;
      color: #333;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover { background: #5a6fd6; }
    
    .btn-success {
      background: #48bb78;
      color: white;
    }
    .btn-success:hover { background: #38a169; }
    
    .btn-danger {
      background: #f56565;
      color: white;
    }
    .btn-danger:hover { background: #e53e3e; }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .main {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #f7fafc;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #cbd5e0;
    }
    .status-dot.active { background: #48bb78; animation: pulse 2s infinite; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .screenshot-container {
      background: #1a202c;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .screenshot-container img {
      max-width: 100%;
      max-height: 600px;
      border-radius: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    .screenshot-placeholder {
      color: #718096;
      font-size: 16px;
    }
    
    .works-list {
      margin-top: 20px;
    }
    
    .works-list h4 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #333;
    }
    
    .work-item {
      padding: 12px 16px;
      background: #f7fafc;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    
    .work-item:hover {
      background: #edf2f7;
      border-color: #667eea;
    }
    
    .work-item.selected {
      background: #e6fffa;
      border-color: #38b2ac;
    }
    
    .work-title {
      font-weight: 500;
      color: #2d3748;
      margin-bottom: 4px;
    }
    
    .work-desc {
      font-size: 12px;
      color: #718096;
    }
    
    .log-container {
      margin-top: 20px;
      background: #1a202c;
      border-radius: 8px;
      padding: 16px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .log-line {
      font-family: 'Consolas', monospace;
      font-size: 12px;
      color: #a0aec0;
      padding: 2px 0;
      border-bottom: 1px solid #2d3748;
    }
    
    .log-line:last-child { border-bottom: none; }
    .log-line.success { color: #48bb78; }
    .log-line.error { color: #f56565; }
    .log-line.info { color: #63b3ed; }
    
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 白梦写作网自动化控制台</h1>
    <p>可视化操作界面 - 自动登录、作品管理</p>
  </div>
  
  <div class="container">
    <div class="sidebar">
      <h3>🎮 操作面板</h3>
      
      <button class="btn btn-primary" id="btn-start" onclick="startBrowser()">
        <span>🚀</span> 启动浏览器
      </button>
      
      <button class="btn btn-primary" id="btn-home" onclick="openHome()" disabled>
        <span>🏠</span> 打开首页
      </button>
      
      <button class="btn btn-success" id="btn-works" onclick="startCreating()" disabled>
        <span>📚</span> 获取作品列表
      </button>
      
      <button class="btn btn-danger" id="btn-close" onclick="closeBrowser()" disabled>
        <span>🔒</span> 关闭浏览器
      </button>
      
      <div class="works-list" id="works-list" style="display:none;">
        <h4>📖 作品列表</h4>
        <div id="works-container"></div>
        <button class="btn btn-success" id="btn-enter" onclick="enterSelectedWork()" disabled>
          <span>▶️</span> 进入选中作品
        </button>
      </div>
    </div>
    
    <div class="main">
      <div class="status-bar">
        <div class="status-indicator">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">浏览器未启动</span>
        </div>
        <span id="step-text">等待操作...</span>
      </div>
      
      <div class="screenshot-container" id="screenshot-container">
        <div class="screenshot-placeholder">
          点击"启动浏览器"开始操作<br>
          截图将显示在这里
        </div>
      </div>
      
      <div class="log-container" id="log-container">
        <div class="log-line">系统就绪...</div>
      </div>
    </div>
  </div>
  
  <script>
    let currentWorks = [];
    let selectedWork = null;
    
    function log(message, type = 'info') {
      const container = document.getElementById('log-container');
      const line = document.createElement('div');
      line.className = `log-line ${type}`;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      container.insertBefore(line, container.firstChild);
    }
    
    function updateStatus(text, active = false) {
      document.getElementById('status-text').textContent = text;
      const dot = document.getElementById('status-dot');
      if (active) {
        dot.classList.add('active');
      } else {
        dot.classList.remove('active');
      }
    }
    
    function updateStep(text) {
      document.getElementById('step-text').textContent = text;
    }
    
    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="loading"></span> 处理中...';
      } else {
        btn.disabled = false;
        btn.innerHTML = btn.getAttribute('data-original');
      }
    }
    
    function showScreenshot(filename) {
      const container = document.getElementById('screenshot-container');
      container.innerHTML = `<img src="/screenshots/${filename}" alt="截图">`;
    }
    
    async function startBrowser() {
      setLoading('btn-start', true);
      log('正在启动浏览器...');
      
      try {
        const res = await fetch('/api/start', { method: 'POST' });
        const data = await res.json();
        
        if (data.success) {
          log('浏览器启动成功', 'success');
          updateStatus('浏览器运行中', true);
          updateStep('浏览器已就绪');
          
          document.getElementById('btn-home').disabled = false;
          document.getElementById('btn-close').disabled = false;
          document.getElementById('btn-start').disabled = true;
        } else {
          log(data.error, 'error');
        }
      } catch (err) {
        log(err.message, 'error');
      }
      
      setLoading('btn-start', false);
    }
    
    async function openHome() {
      setLoading('btn-home', true);
      log('正在打开首页...');
      updateStep('正在加载首页...');
      
      try {
        const res = await fetch('/api/open-home', { method: 'POST' });
        const data = await res.json();
        
        if (data.success) {
          log(data.message, 'success');
          showScreenshot(data.screenshot);
          updateStep('首页已加载');
          document.getElementById('btn-works').disabled = false;
        } else {
          log(data.error, 'error');
        }
      } catch (err) {
        log(err.message, 'error');
      }
      
      setLoading('btn-home', false);
    }
    
    async function startCreating() {
      setLoading('btn-works', true);
      log('正在获取作品列表...');
      updateStep('正在加载作品...');
      
      try {
        const res = await fetch('/api/start-creating', { method: 'POST' });
        const data = await res.json();
        
        if (data.success) {
          log(data.message, 'success');
          showScreenshot(data.screenshot);
          updateStep(`找到 ${data.works.length} 个作品`);
          
          // 显示作品列表
          currentWorks = data.works;
          const container = document.getElementById('works-container');
          container.innerHTML = '';
          
          if (data.works.length === 0) {
            container.innerHTML = '<div class="work-item"><div class="work-title">暂无作品</div></div>';
          } else {
            data.works.forEach((work, index) => {
              const div = document.createElement('div');
              div.className = 'work-item';
              div.onclick = () => selectWork(index);
              div.innerHTML = `
                <div class="work-title">${index + 1}. ${work.title}</div>
                <div class="work-desc">${work.description || '无描述'}</div>
              `;
              container.appendChild(div);
            });
          }
          
          document.getElementById('works-list').style.display = 'block';
        } else {
          log(data.error, 'error');
        }
      } catch (err) {
        log(err.message, 'error');
      }
      
      setLoading('btn-works', false);
    }
    
    function selectWork(index) {
      const items = document.querySelectorAll('.work-item');
      items.forEach((item, i) => {
        if (i === index) {
          item.classList.add('selected');
        } else {
          item.classList.remove('selected');
        }
      });
      
      selectedWork = currentWorks[index];
      document.getElementById('btn-enter').disabled = false;
      log(`已选择作品: ${selectedWork.title}`);
    }
    
    async function enterSelectedWork() {
      if (!selectedWork) return;
      
      setLoading('btn-enter', true);
      log(`正在进入作品: ${selectedWork.title}...`);
      updateStep(`正在进入 ${selectedWork.title}...`);
      
      try {
        const res = await fetch('/api/enter-work', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: selectedWork.title })
        });
        const data = await res.json();
        
        if (data.success) {
          log(data.message, 'success');
          showScreenshot(data.screenshot);
          updateStep(`已进入: ${selectedWork.title}`);
        } else {
          log(data.error, 'error');
        }
      } catch (err) {
        log(err.message, 'error');
      }
      
      setLoading('btn-enter', false);
    }
    
    async function closeBrowser() {
      setLoading('btn-close', true);
      log('正在关闭浏览器...');
      
      try {
        const res = await fetch('/api/close', { method: 'POST' });
        const data = await res.json();
        
        if (data.success) {
          log('浏览器已关闭', 'success');
          updateStatus('浏览器已关闭', false);
          updateStep('等待操作...');
          
          document.getElementById('btn-start').disabled = false;
          document.getElementById('btn-home').disabled = true;
          document.getElementById('btn-works').disabled = true;
          document.getElementById('btn-close').disabled = true;
          document.getElementById('works-list').style.display = 'none';
          
          document.getElementById('screenshot-container').innerHTML = `
            <div class="screenshot-placeholder">
              点击"启动浏览器"开始操作<br>
              截图将显示在这里
            </div>
          `;
        } else {
          log(data.error, 'error');
        }
      } catch (err) {
        log(err.message, 'error');
      }
      
      setLoading('btn-close', false);
    }
    
    // 保存按钮原始文本
    document.querySelectorAll('.btn').forEach(btn => {
      btn.setAttribute('data-original', btn.innerHTML);
    });
  </script>
</body>
</html>
