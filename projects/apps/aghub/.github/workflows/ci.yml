name: CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

env:
    CARGO_TERM_COLOR: always
    FAMA_VERSION: v0.1.3

jobs:
    check:
        name: Check (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
                include:
                    - os: ubuntu-latest
                      fama_target: x86_64-unknown-linux-gnu
                      ext: tar.gz
                    - os: macos-latest
                      fama_target: aarch64-apple-darwin
                      ext: tar.gz
                    - os: windows-latest
                      fama_target: x86_64-pc-windows-gnu
                      ext: zip
        steps:
            - uses: actions/checkout@v4

            - name: Install System Dependencies (Linux)
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install @antfu/ni
              run: bun i -g @antfu/ni

            - name: Install just
              uses: taiki-e/install-action@v2
              with:
                  tool: just

            - name: Cargo Fetch
              run: cargo fetch

            - name: Rust Cache
              uses: Swatinem/rust-cache@v2

            - name: Install frontend dependencies
              run: cd crates/desktop && bun install

            - name: Install fama
              shell: bash
              run: |
                  curl -sL "https://github.com/AkaraChen/fama/releases/download/${{ env.FAMA_VERSION }}/fama-${{ env.FAMA_VERSION }}-${{ matrix.fama_target }}.${{ matrix.ext }}" -o fama.tmp
                  [[ "${{ matrix.ext }}" == "zip" ]] && unzip -q fama.tmp -d ~/.cargo/bin/ || tar -xzf fama.tmp -C ~/.cargo/bin/
                  chmod +x ~/.cargo/bin/fama* || true

            - name: Format Check
              run: |
                  just fmt
                  git diff --exit-code

            - name: Lint
              run: just lint

            - name: Test
              run: just test

            - name: Build
              run: |
                  just build
                  cd crates/desktop && bun run build
