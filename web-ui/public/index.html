<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小说数据管理系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* 头部 */
    .header {
      background: white;
      border-radius: 16px;
      padding: 24px 32px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 28px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .header h1::before {
      content: '📚';
      font-size: 32px;
    }
    
    .search-box {
      display: flex;
      gap: 12px;
    }
    
    .search-box input {
      padding: 12px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 30px;
      font-size: 14px;
      width: 300px;
      transition: all 0.3s;
    }
    
    .search-box input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }
    
    /* 导航标签 */
    .nav-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    
    .nav-tab {
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s;
      background: rgba(255,255,255,0.2);
      color: white;
    }
    
    .nav-tab:hover {
      background: rgba(255,255,255,0.3);
    }
    
    .nav-tab.active {
      background: white;
      color: #667eea;
    }
    
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    
    .stat-card .number {
      font-size: 36px;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .stat-card .label {
      color: #666;
      font-size: 14px;
      margin-top: 8px;
    }
    
    /* 页面容器 */
    .page-container {
      display: none;
    }
    
    .page-container.active {
      display: block;
    }
    
    /* 主内容区 */
    .main-content {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 24px;
    }
    
    /* 侧边栏 */
    .sidebar {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      height: fit-content;
    }
    
    .sidebar h2 {
      font-size: 18px;
      color: #333;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .work-item {
      padding: 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 8px;
    }
    
    .work-item:hover {
      background: #f8f9ff;
    }
    
    .work-item.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .work-item .title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 8px;
    }
    
    .work-item .meta {
      font-size: 12px;
      opacity: 0.7;
    }
    
    /* 内容面板 */
    .content-panel {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .panel-header h2 {
      font-size: 20px;
      color: #333;
    }
    
    /* 标签页 */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .tab {
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
      background: #f5f5f5;
      color: #666;
    }
    
    .tab:hover {
      background: #e8e8e8;
    }
    
    .tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    /* 章节列表 */
    .chapter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    
    .chapter-card {
      padding: 16px;
      border-radius: 12px;
      background: #f8f9ff;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    
    .chapter-card:hover {
      border-color: #667eea;
      transform: translateY(-2px);
    }
    
    .chapter-card.has-content {
      background: #e8f5e9;
    }
    
    .chapter-card .chapter-num {
      font-size: 12px;
      color: #667eea;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .chapter-card .chapter-title {
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    
    .chapter-card .chapter-meta {
      font-size: 12px;
      color: #666;
      display: flex;
      justify-content: space-between;
    }
    
    /* 卷大纲 */
    .volume-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .volume-item {
      padding: 20px;
      border-radius: 12px;
      background: linear-gradient(135deg, #f8f9ff 0%, #fff5f5 100%);
      border-left: 4px solid #667eea;
    }
    
    .volume-item .vol-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .volume-item .vol-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    
    .volume-item .vol-range {
      font-size: 13px;
      color: #667eea;
      background: #e8e8ff;
      padding: 4px 12px;
      border-radius: 12px;
    }
    
    .volume-item .vol-core {
      font-size: 14px;
      color: #666;
    }
    
    /* 角色卡片 */
    .character-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
    }
    
    .character-card {
      padding: 16px;
      border-radius: 12px;
      background: #f8f9ff;
    }
    
    .character-card .char-name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    
    .character-card .char-type {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      margin-bottom: 8px;
    }
    
    .char-type.protagonist { background: #ffe0e0; color: #d32f2f; }
    .char-type.main { background: #e0f0ff; color: #1976d2; }
    .char-type.supporting { background: #e0ffe0; color: #388e3c; }
    .char-type.antagonist { background: #fff0e0; color: #f57c00; }
    
    .character-card .char-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
    
    /* ============ 番茄扫描流水线样式 ============ */
    
    .pipeline-page {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
    }
    
    .pipeline-sidebar {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .pipeline-sidebar h2 {
      font-size: 16px;
      color: #333;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .pipeline-sidebar h2::before {
      content: '🍅';
      font-size: 20px;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }
    
    .form-input, .form-select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #333;
      cursor: pointer;
    }
    
    .checkbox-label input {
      width: 16px;
      height: 16px;
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .btn-success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
    }
    
    .btn-success:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(17, 153, 142, 0.4);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
      color: white;
    }
    
    .btn-danger:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(235, 51, 73, 0.4);
    }
    
    .btn-full {
      width: 100%;
      margin-bottom: 8px;
    }
    
    .pipeline-content {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    /* 进度面板 */
    .progress-panel {
      background: linear-gradient(135deg, #f8f9ff 0%, #fff5f5 100%);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .progress-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
    }
    
    .status-dot.running {
      background: #667eea;
      animation: pulse 1.5s infinite;
    }
    
    .status-dot.success {
      background: #38ef7d;
    }
    
    .status-dot.error {
      background: #f45c43;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .progress-percent {
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* 进度条 */
    .progress-bar-container {
      height: 12px;
      background: #e0e0e0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      border-radius: 6px;
      transition: width 0.3s ease;
    }
    
    .progress-bar-fill.success {
      background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%);
    }
    
    .progress-bar-fill.error {
      background: linear-gradient(90deg, #eb3349 0%, #f45c43 100%);
    }
    
    /* 步骤指示器 */
    .steps-indicator {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .step-item {
      flex: 1;
      text-align: center;
      padding: 12px 8px;
      background: #f5f5f5;
      border-radius: 8px;
      transition: all 0.3s;
    }
    
    .step-item.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .step-item.completed {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
    }
    
    .step-icon {
      font-size: 20px;
      margin-bottom: 4px;
    }
    
    .step-label {
      font-size: 11px;
      font-weight: 500;
    }
    
    /* 任务详情 */
    .task-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    
    .task-info-item {
      padding: 12px;
      background: white;
      border-radius: 8px;
    }
    
    .task-info-label {
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
    }
    
    .task-info-value {
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }
    
    /* 结果列表 */
    .results-panel {
      margin-top: 20px;
    }
    
    .results-header {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .results-list {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
    }
    
    .result-item {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .result-item:last-child {
      border-bottom: none;
    }
    
    .result-item.success {
      color: #388e3c;
    }
    
    .result-item.error {
      color: #d32f2f;
    }
    
    /* 作品选择网格 */
    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    
    .work-card {
      padding: 16px;
      background: #f8f9ff;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    
    .work-card:hover {
      border-color: #667eea;
    }
    
    .work-card.selected {
      border-color: #667eea;
      background: #e8e8ff;
    }
    
    .work-card-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    
    .work-card-meta {
      font-size: 12px;
      color: #666;
    }
    
    /* 模态框 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.show {
      display: flex;
    }
    
    .modal-content {
      background: white;
      border-radius: 20px;
      width: 90%;
      max-width: 900px;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-header h3 {
      font-size: 18px;
      color: #333;
    }
    
    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #f5f5f5;
      cursor: pointer;
      font-size: 20px;
      color: #666;
      transition: all 0.3s;
    }
    
    .modal-close:hover {
      background: #e0e0e0;
    }
    
    .modal-body {
      padding: 24px;
      overflow-y: auto;
      flex: 1;
    }
    
    .chapter-content {
      font-size: 16px;
      line-height: 2;
      color: #333;
      white-space: pre-wrap;
    }
    
    .outline-section {
      margin-bottom: 20px;
    }
    
    .outline-section h4 {
      font-size: 14px;
      color: #667eea;
      margin-bottom: 8px;
    }
    
    .outline-section p {
      font-size: 14px;
      color: #666;
      line-height: 1.8;
    }
    
    /* 加载动画 */
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    
    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    /* 响应式 */
    @media (max-width: 900px) {
      .main-content, .pipeline-page {
        grid-template-columns: 1fr;
      }
      
      .header {
        flex-direction: column;
        gap: 16px;
      }
      
      .search-box input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <h1>小说数据管理系统</h1>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索章节标题或内容...">
      </div>
    </div>
    
    <!-- 导航标签 -->
    <div class="nav-tabs">
      <div class="nav-tab active" data-page="novel">📚 小说管理</div>
      <div class="nav-tab" data-page="pipeline">🍅 番茄扫描流水线</div>
    </div>
    
    <!-- ============ 小说管理页面 ============ -->
    <div id="novelPage" class="page-container active">
      <!-- 统计卡片 -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="number" id="statWorks">-</div>
          <div class="label">作品数</div>
        </div>
        <div class="stat-card">
          <div class="number" id="statChapters">-</div>
          <div class="label">总章节</div>
        </div>
        <div class="stat-card">
          <div class="number" id="statWords">-</div>
          <div class="label">总字数</div>
        </div>
        <div class="stat-card">
          <div class="number" id="statOutlines">-</div>
          <div class="label">章节大纲</div>
        </div>
        <div class="stat-card">
          <div class="number" id="statCharacters">-</div>
          <div class="label">角色数</div>
        </div>
      </div>
      
      <!-- 主内容 -->
      <div class="main-content">
        <!-- 侧边栏 -->
        <div class="sidebar">
          <h2>📖 作品列表</h2>
          <div id="worksList"></div>
        </div>
        
        <!-- 内容面板 -->
        <div class="content-panel">
          <div class="panel-header">
            <h2 id="panelTitle">请选择作品</h2>
          </div>
          
          <!-- 标签页 -->
          <div class="tabs" id="tabs" style="display: none;">
            <div class="tab active" data-tab="chapters">📚 章节</div>
            <div class="tab" data-tab="volumes">📙 卷大纲</div>
            <div class="tab" data-tab="characters">👥 角色</div>
            <div class="tab" data-tab="outlines">📝 章节大纲</div>
          </div>
          
          <div id="tabContent">
            <div class="empty-state">
              <div class="icon">📚</div>
              <p>请从左侧选择一部作品</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- ============ 番茄扫描流水线页面 ============ -->
    <div id="pipelinePage" class="page-container">
      <div class="pipeline-page">
        <!-- 左侧控制面板 -->
        <div class="pipeline-sidebar">
          <h2>番茄扫描中心</h2>
          
          <div class="form-group">
            <label class="form-label">番茄账号</label>
            <select class="form-select" id="fanqieAccount">
              <option value="account_1">番茄账号1</option>
              <option value="account_2">番茄账号2</option>
            </select>
          </div>
          
          <button class="btn btn-primary btn-full" onclick="scanFanqieWorks()">📡 扫描作品</button>
          <button class="btn btn-success btn-full" id="startPipelineBtn" onclick="startPipeline()">▶ 启动流水线</button>
          <button class="btn btn-danger btn-full" id="stopPipelineBtn" onclick="stopPipeline()" disabled>⏹ 停止流水线</button>
          
          <div class="form-group" style="margin-top: 20px;">
            <label class="form-label">发布设置</label>
            <div class="checkbox-group">
              <label class="checkbox-label">
                <input type="checkbox" id="dryRunMode"> 试运行模式
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="headlessMode" checked> 后台运行
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="skipAuditMode" checked> 跳过审核
              </label>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">章节范围</label>
            <input type="number" class="form-input" id="startChapter" placeholder="起始章节">
            <input type="number" class="form-input" id="endChapter" placeholder="结束章节" style="margin-top: 8px;">
          </div>
        </div>
        
        <!-- 右侧内容区 -->
        <div class="pipeline-content">
          <!-- 进度面板 -->
          <div class="progress-panel">
            <div class="progress-header">
              <div class="progress-status">
                <span class="status-dot" id="pipelineStatusDot"></span>
                <span id="pipelineStatusText">空闲</span>
              </div>
              <div class="progress-percent" id="pipelinePercent">0%</div>
            </div>
            
            <!-- 进度条 -->
            <div class="progress-bar-container">
              <div class="progress-bar-fill" id="pipelineProgressBar" style="width: 0%"></div>
            </div>
            
            <!-- 步骤指示器 -->
            <div class="steps-indicator">
              <div class="step-item" id="step1">
                <div class="step-icon">⚙️</div>
                <div class="step-label">初始化</div>
              </div>
              <div class="step-item" id="step2">
                <div class="step-icon">📡</div>
                <div class="step-label">扫描</div>
              </div>
              <div class="step-item" id="step3">
                <div class="step-icon">🔍</div>
                <div class="step-label">审核</div>
              </div>
              <div class="step-item" id="step4">
                <div class="step-icon">🚀</div>
                <div class="step-label">发布</div>
              </div>
            </div>
            
            <!-- 任务详情 -->
            <div class="task-info">
              <div class="task-info-item">
                <div class="task-info-label">当前任务</div>
                <div class="task-info-value" id="pipelineTask">等待启动...</div>
              </div>
              <div class="task-info-item">
                <div class="task-info-label">已用时间</div>
                <div class="task-info-value" id="pipelineTime">-</div>
              </div>
            </div>
          </div>
          
          <!-- 作品选择区 -->
          <div id="fanqieWorksSection">
            <div class="results-header">🍅 选择要发布的作品</div>
            <div class="works-grid" id="fanqieWorksGrid">
              <div class="empty-state">
                <div class="icon">🍅</div>
                <p>点击"扫描作品"获取番茄小说数据</p>
              </div>
            </div>
          </div>
          
          <!-- 结果列表 -->
          <div class="results-panel" id="resultsPanel" style="display: none;">
            <div class="results-header">📋 发布结果</div>
            <div class="results-list" id="resultsList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 章节详情模态框 -->
  <div class="modal" id="chapterModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">章节详情</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div id="modalContent"></div>
      </div>
    </div>
  </div>

  <script>
    // ============ 全局状态 ============
    let currentWork = null;
    let currentTab = 'chapters';
    let currentPage = 'novel';
    let selectedFanqieWorkId = null;
    let pipelineProgressId = null;
    let pipelineEventSource = null;
    let pipelineStartTime = null;
    
    // API 基础地址
    const API_BASE = '/api';
    
    // ============ 导航切换 ============
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const page = tab.dataset.page;
        switchPage(page);
      });
    });
    
    function switchPage(page) {
      currentPage = page;
      
      // 更新导航标签状态
      document.querySelectorAll('.nav-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.page === page);
      });
      
      // 切换页面显示
      document.querySelectorAll('.page-container').forEach(p => {
        p.classList.remove('active');
      });
      document.getElementById(page + 'Page').classList.add('active');
      
      // 如果切换到流水线页面，加载作品列表
      if (page === 'pipeline') {
        loadFanqieWorks();
      }
    }
    
    // ============ 小说管理功能 ============
    
    // API 请求
    async function api(endpoint) {
      const res = await fetch(endpoint);
      return res.json();
    }
    
    // 加载统计数据
    async function loadStats() {
      const { data } = await api(API_BASE + '/stats');
      document.getElementById('statWorks').textContent = data.works;
      document.getElementById('statChapters').textContent = data.chapters;
      document.getElementById('statWords').textContent = data.totalWords ? (data.totalWords / 10000).toFixed(1) + '万' : 0;
      document.getElementById('statOutlines').textContent = data.outlines;
      document.getElementById('statCharacters').textContent = data.characters;
    }
    
    // 加载作品列表
    async function loadWorks() {
      const { data } = await api(API_BASE + '/works');
      const list = document.getElementById('worksList');
      list.innerHTML = data.map(work => `
        <div class="work-item ${currentWork === work.id ? 'active' : ''}" onclick="selectWork(${work.id})">
          <div class="title">${work.title}</div>
          <div class="meta">章节: ${work.has_content_count}/${work.chapter_count} | 状态: ${work.status}</div>
        </div>
      `).join('');
    }
    
    // 选择作品
    async function selectWork(workId) {
      currentWork = workId;
      
      // 更新侧边栏选中状态
      document.querySelectorAll('.work-item').forEach(el => {
        el.classList.remove('active');
      });
      event.target.closest('.work-item').classList.add('active');
      
      // 获取作品详情
      const { data: work } = await api(API_BASE + '/works/' + workId);
      document.getElementById('panelTitle').textContent = work.title;
      document.getElementById('tabs').style.display = 'flex';
      
      // 加载默认标签页
      loadTab('chapters');
    }
    
    // 加载标签页内容
    async function loadTab(tab) {
      currentTab = tab;
      
      // 更新标签页选中状态
      document.querySelectorAll('.tab').forEach(el => {
        el.classList.toggle('active', el.dataset.tab === tab);
      });
      
      const content = document.getElementById('tabContent');
      content.innerHTML = '<div class="loading">加载中</div>';
      
      if (tab === 'chapters') {
        const { data } = await api(API_BASE + '/works/' + currentWork + '/chapters');
        content.innerHTML = `
          <div class="chapter-grid">
            ${data.map(ch => `
              <div class="chapter-card ${ch.word_count > 100 ? 'has-content' : ''}" onclick="showChapter(${ch.id})">
                <div class="chapter-num">第${ch.chapter_number}章</div>
                <div class="chapter-title">${ch.title || '无标题'}</div>
                <div class="chapter-meta">
                  <span>${ch.word_count || 0}字</span>
                  <span>${ch.word_count > 100 ? '✅' : '❌'}</span>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } else if (tab === 'volumes') {
        const { data } = await api(API_BASE + '/works/' + currentWork + '/volumes');
        content.innerHTML = `
          <div class="volume-list">
            ${data.map(vol => `
              <div class="volume-item">
                <div class="vol-header">
                  <div class="vol-title">第${vol.volume_number}卷: ${vol.volume_title}</div>
                  <div class="vol-range">${vol.chapter_range}章</div>
                </div>
                <div class="vol-core">核心冲突: ${vol.volume_core || '-'}</div>
              </div>
            `).join('')}
          </div>
        `;
      } else if (tab === 'characters') {
        const { data } = await api(API_BASE + '/works/' + currentWork + '/characters');
        content.innerHTML = `
          <div class="character-grid">
            ${data.map(char => `
              <div class="character-card">
                <div class="char-name">${char.name}</div>
                <div class="char-type ${char.role_type}">${getRoleType(char.role_type)}</div>
                <div class="char-desc">${char.description ? char.description.substring(0, 100) + '...' : '暂无描述'}</div>
              </div>
            `).join('')}
          </div>
        `;
      } else if (tab === 'outlines') {
        const { data } = await api(API_BASE + '/works/' + currentWork + '/outlines');
        content.innerHTML = `
          <div class="chapter-grid">
            ${data.map(ol => `
              <div class="chapter-card" onclick="showOutline(${ol.chapter_number})">
                <div class="chapter-num">第${ol.chapter_number}章</div>
                <div class="chapter-title">${ol.title || '无标题'}</div>
                <div class="chapter-meta">
                  <span>${ol.plot_summary ? ol.plot_summary.substring(0, 30) + '...' : '无大纲'}</span>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }
    }
    
    // 获取角色类型名称
    function getRoleType(type) {
      const types = {
        'protagonist': '主角',
        'main': '主要角色',
        'supporting': '配角',
        'antagonist': '反派'
      };
      return types[type] || type;
    }
    
    // 显示章节详情
    async function showChapter(chapterId) {
      const { data } = await api(API_BASE + '/chapters/' + chapterId);
      
      document.getElementById('modalTitle').textContent = '第' + data.chapter_number + '章: ' + data.title;
      document.getElementById('modalContent').innerHTML = `
        <div style="margin-bottom: 20px; color: #666;">
          字数: ${data.word_count} | 状态: ${data.status || '草稿'}
        </div>
        ${data.plot_summary ? `
          <div class="outline-section">
            <h4>📝 章节大纲</h4>
            <p>${data.plot_summary}</p>
          </div>
        ` : ''}
        <div class="outline-section">
          <h4>📖 正文内容</h4>
          <div class="chapter-content">${data.content || '(暂无内容)'}</div>
        </div>
      `;
      
      document.getElementById('chapterModal').classList.add('show');
    }
    
    // 显示大纲详情
    async function showOutline(chapterNum) {
      const { data } = await api(API_BASE + '/works/' + currentWork + '/outlines');
      const outline = data.find(o => o.chapter_number === chapterNum);
      
      if (!outline) return;
      
      document.getElementById('modalTitle').textContent = '第' + outline.chapter_number + '章大纲: ' + outline.title;
      document.getElementById('modalContent').innerHTML = `
        ${outline.plot_summary ? `
          <div class="outline-section">
            <h4>情节梗概</h4>
            <p>${outline.plot_summary}</p>
          </div>
        ` : ''}
        ${outline.main_scenes ? `
          <div class="outline-section">
            <h4>主要场景</h4>
            <p>${outline.main_scenes}</p>
          </div>
        ` : ''}
        ${outline.outline_characters ? `
          <div class="outline-section">
            <h4>登场人物</h4>
            <p>${outline.outline_characters}</p>
          </div>
        ` : ''}
        ${outline.emotion_tone ? `
          <div class="outline-section">
            <h4>情感基调</h4>
            <p>${outline.emotion_tone}</p>
          </div>
        ` : ''}
      `;
      
      document.getElementById('chapterModal').classList.add('show');
    }
    
    // 关闭模态框
    function closeModal() {
      document.getElementById('chapterModal').classList.remove('show');
    }
    
    // 搜索
    document.getElementById('searchInput').addEventListener('input', async (e) => {
      const q = e.target.value.trim();
      if (q.length < 2) return;
      
      const { data } = await api(API_BASE + '/search?q=' + encodeURIComponent(q));
      
      document.getElementById('modalTitle').textContent = '搜索结果: "' + q + '"';
      document.getElementById('modalContent').innerHTML = data.length > 0 ? `
        <div class="chapter-grid">
          ${data.map(ch => `
            <div class="chapter-card has-content" onclick="showChapter(${ch.id}); closeModal();">
              <div class="chapter-num">${ch.work_title} - 第${ch.chapter_number}章</div>
              <div class="chapter-title">${ch.title}</div>
              <div class="chapter-meta">
                <span>${ch.word_count}字</span>
              </div>
            </div>
          `).join('')}
        </div>
      ` : '<div class="empty-state">未找到匹配结果</div>';
      
      document.getElementById('chapterModal').classList.add('show');
    });
    
    // 标签页点击
    document.getElementById('tabs').addEventListener('click', (e) => {
      if (e.target.classList.contains('tab')) {
        loadTab(e.target.dataset.tab);
      }
    });
    
    // 点击模态框外部关闭
    document.getElementById('chapterModal').addEventListener('click', (e) => {
      if (e.target.id === 'chapterModal') {
        closeModal();
      }
    });
    
    // ============ 番茄扫描流水线功能 ============
    
    // 加载番茄作品列表
    async function loadFanqieWorks() {
      const grid = document.getElementById('fanqieWorksGrid');
      grid.innerHTML = '<div class="loading">加载中</div>';
      
      try {
        const res = await fetch(API_BASE + '/fanqie/works/account_1');
        const { data } = await res.json();
        
        if (data && data.length > 0) {
          grid.innerHTML = data.map(work => `
            <div class="work-card ${selectedFanqieWorkId === work.workId ? 'selected' : ''}" 
                 onclick="selectFanqieWork('${work.workId}', '${work.title}')">
              <div class="work-card-title">${work.title}</div>
              <div class="work-card-meta">章节: ${work.chapterCount || '-'} | 状态: ${work.status || '-'}</div>
            </div>
          `).join('');
        } else {
          grid.innerHTML = `
            <div class="empty-state">
              <div class="icon">🍅</div>
              <p>点击"扫描作品"获取番茄小说数据</p>
            </div>
          `;
        }
      } catch (e) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="icon">🍅</div>
            <p>点击"扫描作品"获取番茄小说数据</p>
          </div>
        `;
      }
    }
    
    // 扫描番茄作品
    async function scanFanqieWorks() {
      const accountId = document.getElementById('fanqieAccount').value;
      const grid = document.getElementById('fanqieWorksGrid');
      grid.innerHTML = '<div class="loading">正在扫描番茄小说作品...</div>';
      
      try {
        const res = await fetch(API_BASE + '/fanqie/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ accountId })
        });
        const { data } = await res.json();
        
        if (data && data.length > 0) {
          grid.innerHTML = data.map(work => `
            <div class="work-card ${selectedFanqieWorkId === work.workId ? 'selected' : ''}" 
                 onclick="selectFanqieWork('${work.workId}', '${work.title}')">
              <div class="work-card-title">${work.title}</div>
              <div class="work-card-meta">章节: ${work.chapterCount || '-'} | 状态: ${work.status || '-'}</div>
            </div>
          `).join('');
        } else {
          grid.innerHTML = '<div class="empty-state"><p>未找到作品</p></div>';
        }
      } catch (e) {
        grid.innerHTML = '<div class="empty-state"><p>扫描失败: ' + e.message + '</p></div>';
      }
    }
    
    // 选择番茄作品
    function selectFanqieWork(workId, title) {
      selectedFanqieWorkId = workId;
      
      document.querySelectorAll('.work-card').forEach(card => {
        card.classList.remove('selected');
      });
      event.target.closest('.work-card').classList.add('selected');
    }
    
    // 启动流水线
    async function startPipeline() {
      if (!selectedFanqieWorkId) {
        alert('请先选择一个作品');
        return;
      }
      
      const dryRun = document.getElementById('dryRunMode').checked;
      const headless = document.getElementById('headlessMode').checked;
      const skipAudit = document.getElementById('skipAuditMode').checked;
      const startChapter = document.getElementById('startChapter').value;
      const endChapter = document.getElementById('endChapter').value;
      
      pipelineProgressId = 'pipeline_' + Date.now();
      pipelineStartTime = Date.now();
      
      // 更新UI
      document.getElementById('startPipelineBtn').disabled = true;
      document.getElementById('stopPipelineBtn').disabled = false;
      updatePipelineUI({ status: 'running', step: 'init', task: '正在启动流水线...', percent: 0, results: [] });
      
      // 订阅进度
      subscribePipelineProgress(pipelineProgressId);
      
      try {
        const res = await fetch(API_BASE + '/fanqie/publish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            workId: selectedFanqieWorkId,
            headless,
            dryRun,
            skipAudit,
            progressId: pipelineProgressId,
            startChapter: startChapter ? parseInt(startChapter) : undefined,
            endChapter: endChapter ? parseInt(endChapter) : undefined
          })
        });
        
        const result = await res.json();
        
        if (!result.success) {
          updatePipelineUI({ status: 'error', task: '启动失败: ' + result.error, percent: 0 });
          document.getElementById('startPipelineBtn').disabled = false;
          document.getElementById('stopPipelineBtn').disabled = true;
        }
      } catch (e) {
        updatePipelineUI({ status: 'error', task: '启动失败: ' + e.message, percent: 0 });
        document.getElementById('startPipelineBtn').disabled = false;
        document.getElementById('stopPipelineBtn').disabled = true;
      }
    }
    
    // 订阅流水线进度
    function subscribePipelineProgress(id) {
      if (pipelineEventSource) {
        pipelineEventSource.close();
      }
      
      pipelineEventSource = new EventSource(API_BASE + '/fanqie/publish/progress/' + id);
      
      pipelineEventSource.onmessage = (event) => {
        const progress = JSON.parse(event.data);
        updatePipelineUI(progress);
        
        if (progress.status === 'completed' || progress.status === 'error') {
          pipelineEventSource.close();
          pipelineEventSource = null;
          document.getElementById('startPipelineBtn').disabled = false;
          document.getElementById('stopPipelineBtn').disabled = true;
        }
      };
      
      pipelineEventSource.onerror = () => {
        pipelineEventSource.close();
        pipelineEventSource = null;
      };
    }
    
    // 停止流水线
    async function stopPipeline() {
      if (pipelineEventSource) {
        pipelineEventSource.close();
        pipelineEventSource = null;
      }
      
      updatePipelineUI({ status: 'idle', task: '已停止', percent: 0 });
      document.getElementById('startPipelineBtn').disabled = false;
      document.getElementById('stopPipelineBtn').disabled = true;
    }
    
    // 更新流水线UI
    function updatePipelineUI(event) {
      const { status, step, task, detail, percent, results, elapsed, error } = event;
      
      // 状态文字和样式
      const statusDot = document.getElementById('pipelineStatusDot');
      const statusText = document.getElementById('pipelineStatusText');
      
      statusDot.className = 'status-dot';
      if (status === 'running') {
        statusDot.classList.add('running');
        statusText.textContent = '运行中';
      } else if (status === 'completed') {
        statusDot.classList.add('success');
        statusText.textContent = '已完成';
      } else if (status === 'error') {
        statusDot.classList.add('error');
        statusText.textContent = '错误';
      } else {
        statusText.textContent = '空闲';
      }
      
      // 进度条
      const barPercent = percent || 0;
      const progressBar = document.getElementById('pipelineProgressBar');
      progressBar.style.width = barPercent + '%';
      progressBar.className = 'progress-bar-fill';
      if (status === 'completed') progressBar.classList.add('success');
      else if (status === 'error') progressBar.classList.add('error');
      
      document.getElementById('pipelinePercent').textContent = barPercent + '%';
      
      // 步骤状态
      const steps = ['init', 'scan', 'audit', 'publish'];
      const stepIndex = steps.indexOf(step);
      
      steps.forEach((s, i) => {
        const stepEl = document.getElementById('step' + (i + 1));
        if (stepEl) {
          stepEl.classList.remove('active', 'completed');
          if (stepIndex > i || step === 'done') {
            stepEl.classList.add('completed');
          } else if (stepIndex === i) {
            stepEl.classList.add('active');
          }
        }
      });
      
      // 任务信息
      document.getElementById('pipelineTask').textContent = task + (error ? ' - ' + error : '');
      
      // 时间
      if (elapsed) {
        const seconds = Math.floor(elapsed / 1000);
        const minutes = Math.floor(seconds / 60);
        document.getElementById('pipelineTime').textContent = 
          (minutes > 0 ? minutes + '分' : '') + (seconds % 60) + '秒';
      } else if (pipelineStartTime && status === 'running') {
        const elapsed = Date.now() - pipelineStartTime;
        const seconds = Math.floor(elapsed / 1000);
        const minutes = Math.floor(seconds / 60);
        document.getElementById('pipelineTime').textContent = 
          (minutes > 0 ? minutes + '分' : '') + (seconds % 60) + '秒';
      } else {
        document.getElementById('pipelineTime').textContent = '-';
      }
      
      // 结果列表
      if (results && results.length > 0) {
        const resultsPanel = document.getElementById('resultsPanel');
        const resultsList = document.getElementById('resultsList');
        resultsPanel.style.display = 'block';
        resultsList.innerHTML = results.map(r => `
          <div class="result-item ${r.success ? 'success' : 'error'}">
            ${r.success ? '✓' : '✗'} ${r.workTitle || ''} 第${r.chapterNumber}章 - ${r.message}
          </div>
        `).join('');
      }
    }
    
    // ============ 初始化 ============
    loadStats();
    loadWorks();
  </script>
</body>
</html>
