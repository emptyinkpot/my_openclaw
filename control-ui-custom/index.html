<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Control</title>
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <script type="module" crossorigin src="./assets/index-UvgeZ3yV.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/lit-BZwq2xLD.js">
    <link rel="modulepreload" crossorigin href="./assets/format-DeRVtGzv.js">
    <link rel="stylesheet" crossorigin href="./assets/index-DmrclaY-.css">
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      openclaw-app {
        display: block;
        margin-top: 40px;
        height: calc(100vh - 40px);
      }
    </style>
  </head>
  <body>
    <!-- 直接引用本地的导航栏文件，确保能显示 -->
    <!-- 要同步时，运行：cp extensions/public/nav-bar.html control-ui-custom/ -->
    <div id="navbar-container"></div>
    <openclaw-app></openclaw-app>
    
    <script>
      console.log('[Control UI] 加载本地导航栏...');
      fetch('./nav-bar.html')
        .then(res => {
          if (!res.ok) throw new Error('Failed to load local nav-bar.html');
          return res.text();
        })
        .then(html => {
          document.getElementById('navbar-container').innerHTML = html;
          console.log('[Control UI] 本地导航栏加载成功！');
        })
        .catch(err => {
          console.error('[Control UI] 加载失败:', err);
        });
    </script>
  </body>
</html>
