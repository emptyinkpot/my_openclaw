    <style>
      /* 关键：防止导航栏和主页面不重叠！ */
      * {
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden; /* 防止整个页面滚动 */
      }
      #navbar-container {
        position: fixed; /* 导航栏固定在顶部 */
        top: 0;
        left: 0;
        right: 0;
        z-index: 2147483647; /* 确保在最上层 */
        height: 40px; /* 明确高度 */
      }
      openclaw-app {
        display: block;
        position: fixed; /* 主页面也固定 */
        top: 40px; /* 从导航栏下方开始 */
        left: 0;
        right: 0;
        bottom: 0;
        height: calc(100vh - 40px);
        overflow-y: auto; /* 只让主页面滚动 */
      }
    </style>
  </head>
  <body>
    <div id="navbar-container"></div>
    <openclaw-app></openclaw-app>
    
  </body>
