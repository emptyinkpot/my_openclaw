<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日志查看 - 小说管理</title>
  <!-- 公共头部 -->
  <style>
  :root {
    --bg: #f6f8fa; --bg-secondary: #ffffff; --bg-tertiary: #f3f4f6;
    --border: #d0d7de; --border-light: #e5e7eb;
    --text: #24292f; --text-secondary: #57606a; --text-muted: #6e7781;
    --accent: #0969da; --accent-hover: #0550ae;
    --success: #1a7f37; --warning: #9a6700; --danger: #cf222e;
    --purple: #8250df; --pink: #bf3989;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 12px; height: 100vh; overflow: hidden; }
  
  /* 顶部工具栏 */
  .top-bar { height: 36px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; gap: 8px; }
  .btn { padding: 4px 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 4px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); background: var(--bg-tertiary); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-sm { padding: 2px 6px; font-size: 10px; }
  .spacer { flex: 1; }
  
  /* 工具栏 */
  .toolbar { padding: 8px 12px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .toolbar-group { display: flex; gap: 4px; padding-right: 8px; border-right: 1px solid var(--border); }
  .toolbar-group:last-child { border-right: none; }
  
  /* 主布局 */
  .main { display: flex; height: calc(100vh - 36px); }
  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .content-area { flex: 1; overflow-y: auto; padding: 0; }
  </style>
</head>
<body>
  
  <!-- 顶部工具栏 -->
  <div class="top-bar">
    <button class="btn primary" onclick="location.href='/novel/'">📖 返回小说管理</button>
    <div class="divider"></div>
    <span style="font-size: 13px; font-weight: 600;">📋 日志查看</span>
  </div>
  
  <!-- 日志内容区 -->
  <div class="main" style="height: calc(100vh - 36px);">
    <div class="content" style="width: 100%;">
      <div class="toolbar">
        <div class="toolbar-group">
          <button class="btn btn-sm" onclick="refreshLogs()">🔄 刷新</button>
          <button class="btn btn-sm" onclick="clearLogs()">🗑️ 清空</button>
        </div>
        <div class="spacer"></div>
        <div class="toolbar-group">
          <label style="font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="autoRefreshLogs" checked onchange="toggleAutoRefresh()" style="cursor: pointer;">
            自动刷新 (2秒)
          </label>
        </div>
      </div>
      
      <div class="content-area" style="padding: 0;">
        <pre id="logsContent" style="width: 100%; height: 100%; border: none; padding: 12px; font-family: 'Monaco', 'Consolas', monospace; font-size: 11px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; overflow-y: auto; background: #1e1e1e; color: #d4d4d4; margin: 0;">加载中...</pre>
      </div>
    </div>
  </div>
  
  <script>
    // Gateway认证token
    const GATEWAY_TOKEN = 'e1647cdb-1b80-4eee-a975-7599160cc89b';
    const API_BASE = '/api/novel';
    
    let logsAutoRefreshInterval = null;
    
    // API辅助函数
    async function api(path, options = {}) {
      const res = await fetch(API_BASE + path, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + GATEWAY_TOKEN,
          ...(options.headers || {})
        }
      });
      return res.json();
    }
    
    // 日志查看功能
    async function refreshLogs() {
      try {
        const response = await api('/logs');
        if (response.success && response.data) {
          const logsContent = document.getElementById('logsContent');
          if (logsContent) {
            logsContent.textContent = response.data;
            logsContent.scrollTop = logsContent.scrollHeight;
          }
        }
      } catch (err) {
        console.error('[refreshLogs] 刷新失败:', err);
      }
    }
    
    function clearLogs() {
      if (confirm('确定要清空日志吗？')) {
        const logsContent = document.getElementById('logsContent');
        if (logsContent) {
          logsContent.textContent = '日志已清空';
        }
      }
    }
    
    function toggleAutoRefresh() {
      const checkbox = document.getElementById('autoRefreshLogs');
      if (checkbox && checkbox.checked) {
        logsAutoRefreshInterval = setInterval(() => {
          refreshLogs();
        }, 2000);
      } else {
        if (logsAutoRefreshInterval) {
          clearInterval(logsAutoRefreshInterval);
          logsAutoRefreshInterval = null;
        }
      }
    }
    
    // 初始化
    refreshLogs();
    toggleAutoRefresh();
    
    // 占位函数
    function openGlobalSettingsModal() {
      alert('设置功能请在小说管理页面使用');
    }
  </script>
</body>
</html>
