<!-- 加载全局设置弹窗 -->
<script>
// 全局设置弹窗功能（简化调试版）
function openGlobalSettingsModal() {
  console.log('[NavBar] openGlobalSettingsModal 被调用');
  
  // 先检查是否已经加载了全局设置弹窗
  let modal = document.getElementById('globalSettingsModal');
  if (modal) {
    console.log('[NavBar] 找到已有的 globalSettingsModal，显示它');
    modal.classList.add('show');
    return;
  }
  
  console.log('[NavBar] 没有找到 globalSettingsModal，尝试加载');
  
  // 如果没有，尝试加载
  fetch('/settings-modal.html')
    .then(response => {
      console.log('[NavBar] fetch 响应状态:', response.status);
      return response.text();
    })
    .then(html => {
      console.log('[NavBar] 成功获取 settings-modal.html，长度:', html.length);
      console.log('[NavBar] settings-modal.html 内容预览:', html.substring(0, 200));
      
      // 插入到页面
      const container = document.createElement('div');
      container.innerHTML = html;
      console.log('[NavBar] container .innerHTML 预览:', container.innerHTML.substring(0, 200));
      console.log('[NavBar] container.childNodes.length:', container.childNodes.length);
      
      document.body.appendChild(container);
      
      console.log('[NavBar] 已将 settings-modal.html 插入到页面');
      console.log('[NavBar] 现在查询 document.getElementById("globalSettingsModal"):', document.getElementById('globalSettingsModal'));
      console.log('[NavBar] 查询 document.querySelectorAll("#globalSettingsModal"):', document.querySelectorAll('#globalSettingsModal').length);
      console.log('[NavBar] 查询 document.body.lastChild:', document.body.lastChild);
      
      // 延迟一下再打开，确保样式和脚本加载完成
      setTimeout(() => {
        modal = document.getElementById('globalSettingsModal');
        if (modal) {
          console.log('[NavBar] 找到 globalSettingsModal，显示它');
          modal.classList.add('show');
        } else {
          console.error('[NavBar] 插入后仍然找不到 globalSettingsModal');
          console.error('[NavBar] 再次查询 container:', container);
          console.error('[NavBar] container.innerHTML:', container.innerHTML);
        }
      }, 100);
    })
    .catch(err => {
      console.error('[NavBar] 加载全局设置弹窗失败:', err);
      
      // 降级方案 1: 尝试使用页面原有的 settingsModal
      const oldModal = document.getElementById('settingsModal');
      if (oldModal) {
        console.log('[NavBar] 找到旧的 settingsModal，显示它');
        oldModal.classList.add('show');
        return;
      }
      
      // 降级方案 2: 提示用户
      alert('请在小说管理页面使用设置功能');
    });
}

// 页面加载时尝试预加载设置弹窗（可选）
let hasPreloaded = false;
window.addEventListener('load', function() {
  if (!hasPreloaded && window.location.pathname.startsWith('/novel/')) {
    // 在小说管理页面预加载
    hasPreloaded = true;
    console.log('[NavBar] 在小说管理页面，预加载 settings-modal.html');
    fetch('/settings-modal.html').catch(() => {});
  }
});
</script>
