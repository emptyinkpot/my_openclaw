<style>
  :root {
    --bg: #f6f8fa; --bg-secondary: #ffffff; --bg-tertiary: #f3f4f6;
    --border: #d0d7de; --border-light: #e5e7eb;
    --text: #24292f; --text-secondary: #57606a; --text-muted: #6e7781;
    --accent: #0969da; --accent-hover: #0550ae;
    --success: #1a7f37; --warning: #9a6700; --danger: #cf222e;
    --purple: #8250df; --pink: #bf3989;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 12px; height: 100vh; overflow: hidden; }
  
  .main,.sub-page{height:calc(100vh - 76px)!important}
  
  /* 顶部工具栏 */
  .top-bar { height: 36px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; gap: 8px; margin-top: 40px; }
  .logo { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .btn { padding: 4px 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 4px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); background: var(--bg-tertiary); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn.success { background: var(--success); border-color: var(--success); color: #fff; }
  .btn.danger { background: var(--danger); border-color: var(--danger); color: #fff; }
  .btn-sm { padding: 2px 6px; font-size: 10px; }
  .spacer { flex: 1; }
  .search-box { position: relative; }
  .search-box input { width: 200px; padding: 4px 8px 4px 24px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 11px; }
  .search-box::before { content: '🔍'; position: absolute; left: 6px; top: 50%; transform: translateY(-50%); font-size: 10px; }
  
  /* 主布局 */
  .main { display: flex; height: calc(100vh - 36px); }
  .sidebar { width: 220px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-header { padding: 8px 10px; background: var(--bg-tertiary); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .sidebar-title { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
  .sidebar-scroll { flex: 1; overflow-y: auto; }
  .work-item { padding: 8px 10px; cursor: pointer; border-left: 2px solid transparent; display: flex; flex-direction: column; gap: 2px; }
  .work-item:hover { background: var(--bg-tertiary); }
  .work-item.active { background: #ddf4ff; border-left-color: var(--accent); }
  .work-title { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .work-meta { font-size: 10px; color: var(--text-muted); display: flex; gap: 8px; }
  .work-badge { padding: 1px 4px; border-radius: 3px; font-size: 9px; background: var(--bg-tertiary); }
  
  /* 中间内容区 */
  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .stats-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .stat-card { background: var(--bg-secondary); padding: 10px; text-align: center; }
  .stat-value { font-size: 18px; font-weight: 600; color: var(--accent); }
  .stat-value.success { color: var(--success); }
  .stat-value.warning { color: var(--warning); }
  .stat-value.purple { color: var(--purple); }
  .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; }
  
  /* 工具栏 */
  .toolbar { padding: 8px 12px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .toolbar-group { display: flex; gap: 4px; padding-right: 8px; border-right: 1px solid var(--border); }
  .toolbar-group:last-child { border-right: none; }
  .filter-btn { padding: 3px 8px; border: 1px solid var(--border); background: var(--bg-secondary); border-radius: 12px; font-size: 10px; cursor: pointer; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  
  /* 标签页 */
  .tabs { display: flex; background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 12px; }
  .tab { padding: 8px 14px; font-size: 11px; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; position: relative; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-badge { position: absolute; top: 4px; right: 2px; padding: 1px 4px; background: var(--danger); color: #fff; border-radius: 8px; font-size: 9px; }
  
  /* 内容区 */
  .content-area { flex: 1; overflow-y: auto; padding: 12px; }
  
  /* 导航栏 */
  .nav-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 40px;
    background: linear-gradient(135deg, #24292f 0%, #1f2428 100%);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 4px;
    z-index: 9999;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .nav-bar::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  }
  .nav-bar span {
    color: #fff;
    font-weight: 600;
    font-size: 14px;
    margin-right: 16px;
    letter-spacing: 0.3px;
  }
  .nav-bar a {
    color: #8b949e;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 6px;
    text-decoration: none;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  .nav-bar a::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0;
    height: 2px;
    background: #0969da;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    transform: translateX(-50%);
  }
  .nav-bar a:hover {
    color: #fff;
    background: rgba(255,255,255,0.08);
    transform: translateY(-1px);
  }
  .nav-bar a:hover::before {
    width: 80%;
  }
  .nav-bar a.on {
    background: #0969da;
    color: #fff;
    box-shadow: 0 2px 8px rgba(9,105,218,0.3);
  }
  .nav-bar a.on::before {
    width: 100%;
  }
</style>
