<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 经验积累中心</title>
  <style>
    :root {
      --bg: #f6f8fa; --bg-secondary: #ffffff; --bg-tertiary: #f3f4f6;
      --border: #d0d7de; --border-light: #e5e7eb;
      --text: #24292f; --text-secondary: #57606a; --text-muted: #6e7781;
      --accent: #0969da; --accent-hover: #0550ae;
      --success: #1a7f37; --warning: #9a6700; --danger: #cf222e;
      --purple: #8250df; --pink: #bf3989;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 12px; height: 100vh; overflow: hidden; }
    
    /* 导航栏 */
    .nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(135deg, #24292f 0%, #1c2128 100%);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 4px;
      z-index: 9999;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .nav-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }
    .nav-bar span {
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      margin-right: 16px;
      letter-spacing: 0.3px;
    }
    .nav-bar a {
      color: #8b949e;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 6px;
      text-decoration: none;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    .nav-bar a::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 2px;
      background: #0969da;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateX(-50%);
    }
    .nav-bar a:hover {
      color: #fff;
      background: rgba(255,255,255,0.08);
      transform: translateY(-1px);
    }
    .nav-bar a:hover::before {
      width: 80%;
    }
    .nav-bar a.on {
      background: #0969da;
      color: #fff;
      box-shadow: 0 2px 8px rgba(9,105,218,0.3);
    }
    .nav-bar a.on::before {
      width: 100%;
    }
    
    .main { display: flex; height: calc(100vh - 40px); margin-top: 40px; }
    .sidebar { width: 280px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sidebar-header { padding: 12px 16px; background: var(--bg-tertiary); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .sidebar-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .btn { padding: 6px 12px; border: 1px solid var(--border); background: var(--bg); border-radius: 6px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
    .btn:hover { border-color: var(--accent); background: var(--bg-tertiary); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn.danger { background: var(--danger); border-color: var(--danger); color: white; }
    .btn-sm { padding: 4px 8px; font-size: 11px; }
    .sidebar-scroll { flex: 1; overflow-y: auto; padding: 8px; }
    .spacer { flex: 1; }
    
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .toolbar { padding: 12px 16px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
    .toolbar-group { display: flex; gap: 8px; }
    .content-area { flex: 1; overflow: hidden; }
    
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div class="nav-bar">
  <a href="javascript:void(0)" onclick="openGlobalSettingsModal();">⚙️ 设置</a>
  <a href="/novel/">📚 小说管理</a>
  <a href="/publish.html" style="background: linear-gradient(135deg, #f59e0b, #d97706); color: white;">🚀 自动发布</a>
  <a href="/project-structure.html">🏗️ 项目结构</a>
  <a href="/experience.html" class="on">🧠 经验</a>
  <a href="/logs.html" style="background: linear-gradient(135deg, #22c55e, #16a34a); color: white;">📋 日志</a>
  <a href="/cache-manage.html" style="background: linear-gradient(135deg, #8250df, #6d28d9); color: white;">🗄️ 缓存管理</a>
  <a href="/cache.html">💾 缓存</a>
  <a href="/">🎯 原生界面</a>
</div>
  <div class="main">
    <!-- 左侧 -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">🧠 经验记录</span>
      </div>
      <div class="sidebar-scroll">
        <div class="empty-state">
          <div class="empty-icon">📝</div>
          <div>经验积累页面</div>
        </div>
      </div>
    </div>
    
    <!-- 右侧 -->
    <div class="content">
      <div class="toolbar">
        <div class="toolbar-group">
          <button class="btn primary">➕ 记录新经验</button>
        </div>
        <div class="spacer"></div>
      </div>
      
      <div class="content-area">
        <div class="empty-state">
          <div class="empty-icon">🧠</div>
          <div style="font-size: 16px; margin-bottom: 8px;">经验积累中心</div>
          <div style="color: var(--text-muted);">页面正在加载中...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Gateway认证token
    const GATEWAY_TOKEN = 'e1647cdb-1b80-4eee-a975-7599160cc89b';
    const API_BASE = '/api/experience';
    
    // API请求封装
    async function api(endpoint, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GATEWAY_TOKEN}`,
        ...(options.headers || {})
      };
      const res = await fetch(API_BASE + endpoint, { ...options, headers });
      return res.json();
    }
  </script>
  
  <!-- 全局设置弹窗样式 -->
  <style>
  /* 独立设置弹窗样式 - 优化版 */
  #globalSettingsModal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 2147483647;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  #globalSettingsModal.show {
    display: flex;
  }
  #globalSettingsModal * {
    box-sizing: border-box;
  }
  #globalSettingsModal .modal-content {
    background: #ffffff;
    border: 1px solid #d0d7de;
    border-radius: 8px;
    width: 90%;
    max-width: 700px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    position: relative;
    z-index: 2147483647;
  }
  #globalSettingsModal .modal-header {
    padding: 12px 16px;
    border-bottom: 1px solid #d0d7de;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #ffffff;
    flex-shrink: 0;
  }
  #globalSettingsModal .modal-header h3 {
    margin: 0;
    font-size: 16px;
    color: #24292f;
    font-weight: 600;
  }
  #globalSettingsModal .modal-body {
    padding: 16px;
    overflow-y: auto;
    flex: 1;
    background: #f6f8fa;
  }
  #globalSettingsModal .modal-footer {
    padding: 12px 16px;
    border-top: 1px solid #d0d7de;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    background: #ffffff;
    flex-shrink: 0;
  }
  #globalSettingsModal .btn {
    padding: 6px 12px;
    border: 1px solid #d0d7de;
    background: #f6f8fa;
    color: #24292f;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #globalSettingsModal .btn:hover {
    border-color: #0969da;
    background: #f3f4f6;
  }
  #globalSettingsModal .btn.primary {
    background: #0969da;
    border-color: #0969da;
    color: #fff;
  }
  #globalSettingsModal .btn.primary:hover {
    background: #0550ae;
  }
  </style>
  
  <!-- 全局设置模态框 -->
  <div id="globalSettingsModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>⚙️ 系统设置</h3>
        <button class="btn" onclick="closeGlobalSettingsModal()">✕</button>
      </div>
      <div class="modal-body">
        <div style="text-align: center; padding: 40px;">
          <div style="font-size: 48px; margin-bottom: 16px;">⚙️</div>
          <div style="color: var(--text-muted);">设置功能</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeGlobalSettingsModal()">关闭</button>
      </div>
    </div>
  </div>
  
  <!-- 全局设置弹窗脚本 -->
  <script>
    // 打开全局设置弹窗
    function openGlobalSettingsModal() {
      const modal = document.getElementById('globalSettingsModal');
      if (modal) {
        modal.classList.add('show');
      } else {
        alert('设置弹窗未找到');
      }
    }
    
    // 关闭全局设置弹窗
    function closeGlobalSettingsModal() {
      const modal = document.getElementById('globalSettingsModal');
      if (modal) {
        modal.classList.remove('show');
      }
    }
  </script>
</body>
</html>
