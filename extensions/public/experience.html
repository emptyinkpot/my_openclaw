<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 经验积累中心</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #f6f8fa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f3f4f6;
      --border: #d0d7de;
      --text: #24292f;
      --text-secondary: #57606a;
      --text-muted: #6e7781;
      --accent: #0969da;
      --accent-hover: #0550ae;
      --success: #1a7f37;
      --warning: #9a6700;
      --danger: #cf222e;
      --purple: #8250df;
      --pink: #bf3989;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      height: 100vh;
      overflow: hidden;
    }
    
    /* 头部 */
    .header {
      height: 52px;
      background: linear-gradient(135deg, #8250df 0%, #bf3989 100%);
      color: white;
      display: flex;
      flex-direction: column;
      padding: 0 12px;
    }
    
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 32px;
    }
    
    .header-title {
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .header-subtitle {
      font-size: 11px;
      opacity: 0.9;
    }
    
    .header-stats {
      margin-left: auto;
      display: flex;
      gap: 16px;
      font-size: 11px;
    }
    
    .header-stat {
      text-align: center;
    }
    
    .header-stat-value {
      font-size: 14px;
      font-weight: 700;
    }
    
    .header-stat-label {
      font-size: 9px;
      opacity: 0.8;
    }
    
    /* 标签页 */
    .tabs {
      display: flex;
      gap: 4px;
      height: 20px;
    }
    
    .tab {
      padding: 2px 12px;
      font-size: 11px;
      cursor: pointer;
      border-radius: 4px 4px 0 0;
      color: rgba(255,255,255,0.7);
      transition: all 0.15s;
    }
    
    .tab:hover {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    
    .tab.active {
      background: white;
      color: var(--text);
      font-weight: 600;
    }
    
    /* 主布局 */
    .main {
      display: flex;
      height: calc(100vh - 52px - 32px - 40px); /* 减去导航栏高度 40px */
    }
    
    /* 左侧等级面板 */
    .sidebar {
      width: 200px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    
    .level-card {
      padding: 12px;
      background: linear-gradient(135deg, #8250df 0%, #bf3989 100%);
      color: white;
      text-align: center;
    }
    
    .level-badge {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 2px solid rgba(255,255,255,0.3);
    }
    
    .level-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    
    .level-num {
      font-size: 11px;
      opacity: 0.9;
      margin-bottom: 8px;
    }
    
    .xp-bar {
      background: rgba(255,255,255,0.2);
      border-radius: 6px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    
    .xp-fill {
      background: white;
      height: 100%;
      border-radius: 6px;
      transition: width 0.5s;
    }
    
    .xp-text {
      font-size: 10px;
      opacity: 0.9;
    }
    
    /* 统计区域 */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--border);
    }
    
    .stat-box {
      background: var(--bg-tertiary);
      padding: 8px;
      border-radius: 6px;
      text-align: center;
    }
    
    .stat-box-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
    }
    
    .stat-box-label {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    
    /* 类型分布 */
    .type-distribution {
      padding: 10px;
      border-bottom: 1px solid var(--border);
    }
    
    .type-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .type-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      font-size: 11px;
    }
    
    .type-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    
    .type-name {
      flex: 1;
    }
    
    .type-count {
      color: var(--text-muted);
    }
    
    .type-bar {
      width: 40px;
      height: 3px;
      background: var(--bg-tertiary);
      border-radius: 2px;
    }
    
    .type-fill {
      height: 100%;
      border-radius: 2px;
    }
    
    /* 搜索 */
    .search-area {
      padding: 8px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
    
    .search-input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 11px;
      outline: none;
    }
    
    .search-input:focus {
      border-color: var(--accent);
    }
    
    /* 右侧内容区 */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* 工具栏 */
    .toolbar {
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    .btn {
      padding: 4px 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
    }
    
    .btn:hover {
      border-color: var(--accent);
      background: var(--bg-tertiary);
    }
    
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
    }
    
    .filter-tabs {
      display: flex;
      gap: 2px;
    }
    
    .filter-tab {
      padding: 3px 8px;
      border-radius: 8px;
      font-size: 10px;
      cursor: pointer;
      border: 1px solid transparent;
    }
    
    .filter-tab:hover {
      background: var(--bg-tertiary);
    }
    
    .filter-tab.active {
      background: var(--accent);
      color: white;
    }
    
    .toolbar-spacer {
      flex: 1;
    }
    
    /* 经验列表 */
    .exp-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: none;
    }
    
    .exp-list.active {
      display: block;
    }
    
    .exp-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    
    .exp-card:hover {
      border-color: var(--accent);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    
    .exp-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }
    
    .exp-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    
    .exp-meta {
      flex: 1;
      min-width: 0;
    }
    
    .exp-title {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .exp-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    
    .exp-tag {
      padding: 1px 6px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      font-size: 9px;
      color: var(--text-secondary);
    }
    
    .exp-type-tag {
      padding: 1px 6px;
      border-radius: 8px;
      font-size: 9px;
    }
    
    .exp-desc {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.4;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }
    
    .exp-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 10px;
      color: var(--text-muted);
    }
    
    .exp-xp {
      margin-left: auto;
      padding: 1px 8px;
      background: linear-gradient(135deg, #8250df20, #bf398920);
      border-radius: 8px;
      color: #8250df;
      font-weight: 600;
      font-size: 10px;
    }
    
    /* 笔记列表 */
    .note-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: none;
    }
    
    .note-list.active {
      display: block;
    }
    
    .note-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    
    .note-card:hover {
      border-color: var(--accent);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    
    .note-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }
    
    .note-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: linear-gradient(135deg, #0969da20, #0550ae20);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    
    .note-meta {
      flex: 1;
      min-width: 0;
    }
    
    .note-title {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .note-category {
      display: inline-block;
      padding: 1px 6px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      font-size: 9px;
      color: var(--text-secondary);
    }
    
    .note-content {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.4;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    
    .note-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 10px;
      color: var(--text-muted);
    }
    
    /* 专栏列表 */
    .column-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: none;
    }
    
    .column-list.active {
      display: block;
    }
    
    .column-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    
    .column-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .column-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }
    
    .column-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: linear-gradient(135deg, #8250df20, #bf398920);
      color: #8250df;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    
    .column-meta {
      flex: 1;
      min-width: 0;
    }
    
    .column-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .column-category {
      display: inline-block;
      padding: 2px 8px;
      background: var(--bg-tertiary);
      border-radius: 10px;
      font-size: 10px;
      color: var(--text-secondary);
      margin-right: 6px;
    }
    
    .column-description {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 8px;
    }
    
    .column-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 10px;
      color: var(--text-muted);
    }
    
    .column-stats {
      display: flex;
      gap: 12px;
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 40px 16px;
      color: var(--text-muted);
    }
    
    .empty-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }
    
    .empty-text {
      font-size: 12px;
      margin-bottom: 6px;
    }
    
    .empty-hint {
      font-size: 11px;
    }
    
    /* 模态框 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.show {
      display: flex;
    }
    
    .modal-content {
      background: var(--bg-secondary);
      border-radius: 8px;
      width: 90%;
      max-width: 520px;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .modal-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-title {
      font-size: 13px;
      font-weight: 600;
    }
    
    .modal-close {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--text-muted);
    }
    
    .modal-body {
      padding: 14px;
      overflow-y: auto;
      flex: 1;
    }
    
    .form-group {
      margin-bottom: 10px;
    }
    
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      margin-bottom: 4px;
      color: var(--text-secondary);
    }
    
    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 11px;
      outline: none;
      font-family: inherit;
    }
    
    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
      border-color: var(--accent);
    }
    
    .form-textarea {
      resize: vertical;
      min-height: 60px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    
    .modal-footer {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
  </style>
</head>
<body>
  <!-- 头部 -->
  <div class="header">
    <div class="header-top">
      <div class="header-title">
        🧠 经验积累中心
        <span class="header-subtitle">记录成长，积累智慧</span>
      </div>
      <div class="header-stats">
        <div class="header-stat">
          <div class="header-stat-value" id="headerLevel">1</div>
          <div class="header-stat-label">等级</div>
        </div>
        <div class="header-stat">
          <div class="header-stat-value" id="headerXP">0</div>
          <div class="header-stat-label">总经验</div>
        </div>
        <div class="header-stat">
          <div class="header-stat-value" id="headerRecords">0</div>
          <div class="header-stat-label">记录数</div>
        </div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('experience')">📝 经验</div>
      <div class="tab" onclick="switchTab('notes')">📒 笔记</div>
      <div class="tab" onclick="switchTab('columns')">📚 专栏</div>
    </div>
  </div>
  
  <!-- 主布局 -->
  <div class="main">
    <!-- 左侧边栏 -->
    <div class="sidebar" id="experienceSidebar">
      <div class="level-card">
        <div class="level-badge" id="levelBadge">🌱</div>
        <div class="level-title" id="levelTitle">新手</div>
        <div class="level-num">Level <span id="levelNum">1</span></div>
        <div class="xp-bar">
          <div class="xp-fill" id="xpFill" style="width: 0%"></div>
        </div>
        <div class="xp-text"><span id="currentXP">0</span> / <span id="nextXP">1000</span> XP</div>
      </div>
      
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-box-value" id="statTotalXP" style="color: var(--purple)">0</div>
          <div class="stat-box-label">总经验</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-value" id="statRecords" style="color: var(--success)">0</div>
          <div class="stat-box-label">记录数</div>
        </div>
      </div>
      
      <div class="type-distribution">
        <div class="type-title">📊 类型分布</div>
        <div id="typeList">
          <div class="type-item">
            <span style="color: var(--text-muted); font-size: 11px;">暂无数据</span>
          </div>
        </div>
      </div>
      
      <div class="search-area">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索经验...">
      </div>
    </div>
    
    <!-- 右侧内容 -->
    <div class="content">
      <!-- 经验工具栏 -->
      <div class="toolbar" id="experienceToolbar">
        <button class="btn btn-primary" onclick="showAddModal()">
          ➕ 记录新经验
        </button>
        <div class="filter-tabs">
          <div class="filter-tab active" onclick="filterExp('all')">全部</div>
          <div class="filter-tab" onclick="filterExp('problem_solving')">🎯 问题解决</div>
          <div class="filter-tab" onclick="filterExp('bug_fix')">🐛 Bug修复</div>
          <div class="filter-tab" onclick="filterExp('feature_dev')">✨ 功能开发</div>
        </div>
        <div class="toolbar-spacer"></div>
        <button class="btn" onclick="refreshData()">🔄 刷新</button>
      </div>
      
      <!-- 笔记工具栏 -->
      <div class="toolbar" id="notesToolbar" style="display: none;">
        <button class="btn btn-primary" onclick="showAddNoteModal()">
          ➕ 新建笔记
        </button>
        <div class="filter-tabs" id="noteCategoryTabs">
          <div class="filter-tab active" onclick="filterNotes('all')">全部</div>
        </div>
        <div class="toolbar-spacer"></div>
        <button class="btn" onclick="refreshNotes()">🔄 刷新</button>
      </div>
      
      <!-- 专栏工具栏 -->
      <div class="toolbar" id="columnsToolbar" style="display: none;">
        <div class="filter-tabs" id="columnCategoryTabs">
          <div class="filter-tab active" onclick="filterColumns('all')">全部</div>
          <div class="filter-tab" onclick="filterColumns('dev_flow')">🔧 开发流程</div>
          <div class="filter-tab" onclick="filterColumns('tech_stack')">💻 技术栈</div>
          <div class="filter-tab" onclick="filterColumns('best_practices')">✨ 最佳实践</div>
        </div>
        <div class="toolbar-spacer"></div>
        <button class="btn" onclick="refreshColumns()">🔄 刷新</button>
      </div>
      
      <!-- 经验列表 -->
      <div class="exp-list active" id="expList">
        <div class="empty-state">
          <div class="empty-icon">📝</div>
          <div class="empty-text">暂无经验记录</div>
          <div class="empty-hint">点击"记录新经验"添加第一条记录</div>
        </div>
      </div>
      
      <!-- 笔记列表 -->
      <div class="note-list" id="noteList">
        <div class="empty-state">
          <div class="empty-icon">📒</div>
          <div class="empty-text">暂无笔记</div>
          <div class="empty-hint">点击"新建笔记"添加第一条笔记</div>
        </div>
      </div>
      
      <!-- 专栏列表 -->
      <div class="column-list" id="columnList">
        <div class="empty-state">
          <div class="empty-icon">📚</div>
          <div class="empty-text">暂无专栏</div>
          <div class="empty-hint">专栏正在整理中...</div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 添加经验模态框 -->
  <div class="modal" id="addModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">➕ 记录新经验</div>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="expForm">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">经验类型</label>
              <select class="form-select" id="expType">
                <option value="problem_solving">🎯 问题解决</option>
                <option value="bug_fix">🐛 Bug修复</option>

                <option value="optimization">⚡ 性能优化</option>

                <option value="3">⭐⭐⭐ 困难</option>

          <div class="form-group">

          <div class="form-group">
            <label class="form-label">详细描述</label>
            <textarea class="form-textarea" id="expDesc" placeholder="详细描述这次经验的背景、过程..."></textarea>
          </div>
          
          <div class="form-group">
            <label class="form-label">用户问题 / 需求</label>
            <textarea class="form-textarea" id="expQuery" placeholder="用户提出了什么问题或需求？"></textarea>

          <div class="form-group">
            <label class="form-label">解决方案</label>
            <textarea class="form-textarea" id="expSolution" placeholder="你是如何解决这个问题的？"></textarea>
          </div>
          
          <div class="form-group">
            <label class="form-label">运用的经验（逗号分隔）</label>
            <input type="text" class="form-input" id="expApplied" placeholder="例如：JS语法检查, 错误定位技巧">
          </div>
          
          <div class="form-group">
            <label class="form-label">新积累的经验（逗号分隔）</label>
            <input type="text" class="form-input" id="expGained" placeholder="例如：模块化设计, 正则表达式优化">
          </div>
          
          <div class="form-group">
            <label class="form-label">标签（逗号分隔）</label>
            <input type="text" class="form-input" id="expTags" placeholder="例如：javascript, debug, ui">
          </div>

      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveExp()">💾 保存经验</button>
      </div>
    </div>
  </div>
  
  <!-- 添加笔记模态框 -->
  <div class="modal" id="addNoteModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">📒 新建笔记</div>
        <button class="modal-close" onclick="closeNoteModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="noteForm">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">分类</label>
              <select class="form-select" id="noteCategory">
                <option value="general">💡 一般</option>
                <option value="dev">💻 开发</option>
                <option value="debug">🐛 调试</option>
                <option value="design">🎨 设计</option>
                <option value="deployment">🚀 部署</option>
                <option value="other">📦 其他</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">标题 *</label>
              <input type="text" class="form-input" id="noteTitle" placeholder="笔记标题..." required>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">内容</label>
            <textarea class="form-textarea" id="noteContent" placeholder="笔记内容..." style="min-height: 150px;"></textarea>
          </div>
          
          <div class="form-group">
            <label class="form-label">标签（逗号分隔）</label>
            <input type="text" class="form-input" id="noteTags" placeholder="例如：javascript, mysql, api">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeNoteModal()">取消</button>
        <button class="btn btn-primary" onclick="saveNote()">💾 保存笔记</button>
      </div>
    </div>
  </div>

  <script>
    // Gateway认证token
    const GATEWAY_TOKEN = 'e1647cdb-1b80-4eee-a975-7599160cc89b';
    
    // 配置
    const API_BASE = '/api/experience';
    
    // API请求封装
    async function api(endpoint, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GATEWAY_TOKEN}`,
        ...(options.headers || {})
      };
      const res = await fetch(API_BASE + endpoint, { ...options, headers });
      return res.json();
    }
    
    // 经验类型映射
    const expTypeMap = {
      problem_solving: { label: '问题解决', icon: '🎯', color: '#0969da', bg: '#ddf4ff' },
      bug_fix: { label: 'Bug修复', icon: '🐛', color: '#cf222e', bg: '#ffebe9' },
      feature_dev: { label: '功能开发', icon: '✨', color: '#1a7f37', bg: '#dafbe1' },
      optimization: { label: '性能优化', icon: '⚡', color: '#9a6700', bg: '#fff8c5' },
      refactoring: { label: '代码重构', icon: '🔧', color: '#8250df', bg: '#fbefff' },
      learning: { label: '学习成长', icon: '📚', color: '#bf3989', bg: '#ffeff7' }
    };
    
    // 笔记分类映射
    const noteCategoryMap = {
      general: { label: '一般', icon: '💡' },
      dev: { label: '开发', icon: '💻' },
      debug: { label: '调试', icon: '🐛' },
      design: { label: '设计', icon: '🎨' },
      deployment: { label: '部署', icon: '🚀' },
      other: { label: '其他', icon: '📦' }
    };
    
    // 等级配置
    const levelTitles = ['🌱 新手', '🔰 学徒', '🎯 助手', '💎 专家', '👑 大师', '🔮 宗师', '⭐ 传奇'];
    const levelEmojis = ['🌱', '🔰', '🎯', '💎', '👑', '🔮', '⭐'];
    
    // 状态
    let expData = [];
    let noteData = [];
    let currentFilter = 'all';
    let currentNoteFilter = 'all';
    let currentTab = 'experience';
    
    // 初始化
    async function init() {
      // 先加载经验数据（必须）
      try {
        await loadData();
      } catch (err) {
        console.error('加载经验数据失败:', err);
      }
      
      // 再尝试加载笔记数据（可选，失败不影响）
      try {
        await loadNotes();
      } catch (err) {
        console.error('加载笔记数据失败（可选功能）:', err);
        // 笔记功能不可用，不影响经验功能
      }
    }
    
    // 切换标签
    function switchTab(tab) {
      currentTab = tab;
      
      // 更新标签样式
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      // 更新左侧边栏
      document.getElementById('experienceSidebar').style.display = tab === 'experience' ? 'flex' : 'none';
      
      // 更新工具栏
      document.getElementById('experienceToolbar').style.display = tab === 'experience' ? 'flex' : 'none';
      document.getElementById('notesToolbar').style.display = tab === 'notes' ? 'flex' : 'none';
      document.getElementById('columnsToolbar').style.display = tab === 'columns' ? 'flex' : 'none';
      
      // 更新列表
      document.getElementById('expList').classList.toggle('active', tab === 'experience');
      document.getElementById('noteList').classList.toggle('active', tab === 'notes');
      document.getElementById('columnList').classList.toggle('active', tab === 'columns');
      
      // 如果是专栏标签，加载专栏数据
      if (tab === 'columns') {
        renderColumnList();
      }
    }
    
    // ========== 经验相关 ==========
    
    // 加载数据
    async function loadData() {
      console.log('[Experience] loadData 开始执行');
      try {
        console.log('[Experience] 开始请求 API');
        const [statsRes, recordsRes] = await Promise.all([
          api('/stats'),
          api('/records')
        ]);
        
        console.log('[Experience] statsRes:', statsRes);
        console.log('[Experience] recordsRes:', recordsRes);
        
        if (statsRes.success) {
          updateStats(statsRes.data);
        }
        if (recordsRes.success) {
          expData = recordsRes.data;
          console.log('[Experience] expData 已设置，长度:', expData.length);
          renderList();
        }
      } catch (err) {
        console.error('[Experience] 加载失败:', err);
      }
    }
    
    // 更新统计
    function updateStats(stats) {
      document.getElementById('headerLevel').textContent = stats.level;
      document.getElementById('headerXP').textContent = stats.totalXP;
      document.getElementById('headerRecords').textContent = stats.totalRecords;
      document.getElementById('levelBadge').textContent = levelEmojis[Math.min(stats.level - 1, 6)];
      document.getElementById('levelTitle').textContent = levelTitles[Math.min(stats.level - 1, 6)].split(' ')[1];
      document.getElementById('levelNum').textContent = stats.level;
      document.getElementById('currentXP').textContent = stats.totalXP % 1000;
      document.getElementById('nextXP').textContent = 1000;
      document.getElementById('xpFill').style.width = ((stats.totalXP % 1000) / 1000 * 100) + '%';
      document.getElementById('statTotalXP').textContent = stats.totalXP;
      document.getElementById('statRecords').textContent = stats.totalRecords;
      
      // 类型分布
      const typeList = document.getElementById('typeList');
      const types = Object.entries(stats.typeDistribution || {}).sort((a, b) => b[1] - a[1]);
      if (types.length === 0) {
        typeList.innerHTML = '<div class="type-item"><span style="color: var(--text-muted); font-size: 11px;">暂无数据</span></div>';
      } else {
        typeList.innerHTML = types.map(([type, count]) => {
          // 👇 修复：如果类型不在 map 里，使用默认值
          const info = expTypeMap[type] || { 
            label: type || '未知', 
            icon: '📌', 
            color: '#666', 
            bg: '#f0f0f0' 
          };
          const percent = stats.totalRecords ? (count / stats.totalRecords * 100) : 0;
          return `
            <div class="type-item">
              <div class="type-dot" style="background: ${info.color}"></div>
              <span class="type-name">${info.icon} ${info.label}</span>
              <span class="type-count">${count}</span>
              <div class="type-bar"><div class="type-fill" style="width: ${percent}%; background: ${info.color}"></div></div>
            </div>
          `;
        }).join('');
      }
    }
    
    // 渲染列表
    function renderList() {
      console.log('[Experience] renderList 开始执行');
      console.log('[Experience] expData:', expData);
      const list = document.getElementById('expList');
      console.log('[Experience] expList 元素:', list);
      let filtered = expData;
      if (currentFilter !== 'all') {
        filtered = expData.filter(e => e.type === currentFilter);
      }
      console.log('[Experience] filtered 长度:', filtered.length);
      
      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <div class="empty-text">暂无经验记录</div>
            <div class="empty-hint">点击"记录新经验"添加第一条记录</div>
          </div>
        `;
        return;
      }
      
      const htmlContent = filtered.map(exp => {
        const typeInfo = expTypeMap[exp.type] || { label: exp.type || '未知', icon: '📌', color: '#666', bg: '#f0f0f0' };
        const stars = '⭐'.repeat(exp.difficulty || 1);
        const date = exp.timestamp ? new Date(exp.timestamp).toLocaleDateString() : '未知日期';
        const tags = exp.tags || [];
        // 支持 problem 字段（新格式）和 description/userQuery（旧格式）
        const desc = exp.problem || exp.description || exp.userQuery || '无描述';
        return `
          <div class="exp-card" onclick="showDetail('${exp.id}')">
            <div class="exp-header">
              <div class="exp-icon" style="background: ${typeInfo.bg}; color: ${typeInfo.color}">${typeInfo.icon}</div>
              <div class="exp-meta">
                <div class="exp-title">${exp.title || '无标题'}</div>
                <div class="exp-tags">
                  <span class="exp-type-tag" style="background: ${typeInfo.bg}; color: ${typeInfo.color}">${typeInfo.label}</span>
                  <span class="exp-tag">${stars}</span>
                  ${tags.slice(0, 3).map(t => `<span class="exp-tag">${t}</span>`).join('')}
                </div>
              </div>
            </div>
            <div class="exp-desc">${desc}</div>
            <div class="exp-footer">
              <span>📅 ${date}</span>
              ${exp.experienceGained?.length ? `<span>💡 ${exp.experienceGained.length}项新经验</span>` : ''}
              <span class="exp-xp">+${exp.xpGained || (exp.difficulty * 50) || 50} XP</span>
            </div>
          </div>
        `;
      }).join('');
      
      console.log('[Experience] 生成的 HTML 长度:', htmlContent.length);
      console.log('[Experience] 生成的 HTML 预览:', htmlContent.substring(0, 300));
      
      list.innerHTML = htmlContent;
      console.log('[Experience] list.innerHTML 已设置');
      
      // 确保 expList 有 active 类，确保显示
      list.classList.add('active');
      console.log('[Experience] 已给 expList 添加 active 类');
    }
    
    // 过滤
    function filterExp(type) {
      currentFilter = type;
      document.querySelectorAll('#experienceToolbar .filter-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      renderList();
    }
    
    // 显示添加模态框
    function showAddModal() {
      document.getElementById('addModal').classList.add('show');
    }
    
    // 关闭模态框
    function closeModal() {
      document.getElementById('addModal').classList.remove('show');
      document.getElementById('expForm').reset();
    }
    
    // 保存经验
    async function saveExp() {
      const difficulty = parseInt(document.getElementById('expDifficulty').value);
      const xp = difficulty * 50 + Math.floor(Math.random() * 20);
      
      const data = {
        type: document.getElementById('expType').value,
        title: document.getElementById('expTitle').value,
        description: document.getElementById('expDesc').value,
        userQuery: document.getElementById('expQuery').value,
        solution: document.getElementById('expSolution').value,
        experienceApplied: document.getElementById('expApplied').value.split(',').map(s => s.trim()).filter(Boolean),
        experienceGained: document.getElementById('expGained').value.split(',').map(s => s.trim()).filter(Boolean),
        tags: document.getElementById('expTags').value.split(',').map(s => s.trim()).filter(Boolean),
        difficulty: difficulty,
        xpGained: xp
      };
      
      try {
        const result = await api('/records', {
          method: 'POST',
          body: JSON.stringify(data)
        });
        if (result.success) {
          closeModal();
          await loadData();
          alert(`✅ 经验已记录！获得 ${xp} XP`);
        } else {
          alert('❌ 保存失败: ' + (result.error || '未知错误'));
        }
      } catch (err) {
        alert('❌ 保存失败: ' + err.message);
      }
    }
    
    // 刷新
    function refreshData() {
      loadData();
    }
    
    // 显示详情
    function showDetail(id) {
      const exp = expData.find(e => e.id === id);
      if (!exp) return;
      
      let message = `📌 标题: ${exp.title}\n\n`;
      
      if (exp.problem) {
        message += `❓ 问题:\n${exp.problem}\n\n`;
      } else if (exp.description) {
        message += `📝 描述:\n${exp.description}\n\n`;
      } else if (exp.userQuery) {
        message += `💬 查询:\n${exp.userQuery}\n\n`;
      }
      
      if (exp.solution) {
        message += `✅ 解决方案:\n${exp.solution}\n\n`;
      }
      
      if (exp.steps && exp.steps.length > 0) {
        message += `📋 解决步骤:\n`;
        exp.steps.forEach((step, index) => {
          message += `${index + 1}. ${step}\n`;
        });
        message += '\n';
      }
      
      if (exp.tags && exp.tags.length > 0) {
        message += `🏷️ 标签: ${exp.tags.join(', ')}\n\n`;
      }
      
      alert(message);
    }
    
    // 搜索
    document.getElementById('searchInput')?.addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      if (!q) {
        loadData();
        return;
      }
      const filtered = expData.filter(exp => 
        exp.title.toLowerCase().includes(q) ||
        (exp.problem && exp.problem.toLowerCase().includes(q)) ||
        (exp.description && exp.description.toLowerCase().includes(q)) ||
        (exp.solution && exp.solution.toLowerCase().includes(q)) ||
        exp.tags.some(t => t.toLowerCase().includes(q))
      );
      const list = document.getElementById('expList');
      list.innerHTML = filtered.length === 0 ? `
        <div class="empty-state">
          <div class="empty-icon">📝</div>
          <div class="empty-text">未找到匹配的记录</div>
        </div>
      ` : filtered.map(exp => {
        const typeInfo = expTypeMap[exp.type] || { label: exp.type || '未知', icon: '📌', color: '#666', bg: '#f0f0f0' };
        const stars = '⭐'.repeat(exp.difficulty || 1);
        const date = exp.timestamp ? new Date(exp.timestamp).toLocaleDateString() : '未知日期';
        const tags = exp.tags || [];
        // 支持 problem 字段（新格式）和 description/userQuery（旧格式）
        const desc = exp.problem || exp.description || exp.userQuery || '无描述';
        return `
          <div class="exp-card" onclick="showDetail('${exp.id}')">
            <div class="exp-header">
              <div class="exp-icon" style="background: ${typeInfo.bg}; color: ${typeInfo.color}">${typeInfo.icon}</div>
              <div class="exp-meta">
                <div class="exp-title">${exp.title || '无标题'}</div>
                <div class="exp-tags">
                  <span class="exp-type-tag" style="background: ${typeInfo.bg}; color: ${typeInfo.color}">${typeInfo.label}</span>
                  <span class="exp-tag">${stars}</span>
                  ${tags.slice(0, 3).map(t => `<span class="exp-tag">${t}</span>`).join('')}
                </div>
              </div>
            </div>
            <div class="exp-desc">${desc}</div>
            <div class="exp-footer">
              <span>📅 ${date}</span>
              ${exp.experienceGained?.length ? `<span>💡 ${exp.experienceGained.length}项新经验</span>` : ''}
              <span class="exp-xp">+${exp.xpGained || (exp.difficulty * 50) || 50} XP</span>
            </div>
          </div>
        `;
      }).join('');
    });
    
    // ========== 笔记相关 ==========
    
    // 加载笔记
    async function loadNotes() {
      try {
        const [notesRes, categoriesRes] = await Promise.all([
          api('/notes'),
          api('/notes/categories')
        ]);
        
        if (notesRes.success) {
          noteData = notesRes.data;
          renderNoteList();
        }
        
        if (categoriesRes.success) {
          renderNoteCategories(categoriesRes.data);
        }
      } catch (err) {
        console.error('加载笔记失败:', err);
        // 笔记功能不可用，设置为空数组
        noteData = [];
        renderNoteList();
      }
    }
    
    // 渲染笔记分类标签
    function renderNoteCategories(categories) {
      const tabsContainer = document.getElementById('noteCategoryTabs');
      if (!tabsContainer) return;
      
      tabsContainer.innerHTML = '<div class="filter-tab active" onclick="filterNotes(\'all\')">全部</div>';
      
      // 笔记功能当前不可用，不渲染分类
      if (!categories || categories.length === 0) return;
      
      categories.forEach(cat => {
        const info = noteCategoryMap[cat] || { label: cat, icon: '📦' };
        const tab = document.createElement('div');
        tab.className = 'filter-tab';
        tab.textContent = `${info.icon} ${info.label}`;
        tab.onclick = () => filterNotes(cat);
        tabsContainer.appendChild(tab);
      });
    }
    
    // 渲染笔记列表
    function renderNoteList() {
      const list = document.getElementById('noteList');
      let filtered = noteData;
      if (currentNoteFilter !== 'all') {
        filtered = noteData.filter(n => n.category === currentNoteFilter);
      }
      
      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📒</div>
            <div class="empty-text">暂无笔记</div>
            <div class="empty-hint">点击"新建笔记"添加第一条笔记</div>
          </div>
        `;
        return;
      }
      
      list.innerHTML = filtered.map(note => {
        const categoryInfo = noteCategoryMap[note.category] || { label: note.category || '其他', icon: '📦' };
        const date = note.updated_at ? new Date(note.updated_at).toLocaleDateString() : '未知日期';
        const tags = note.tags ? (Array.isArray(note.tags) ? note.tags : JSON.parse(note.tags)) : [];
        return `
          <div class="note-card" onclick="showNoteDetail('${note.id}')">
            <div class="note-header">
              <div class="note-icon">${categoryInfo.icon}</div>
              <div class="note-meta">
                <div class="note-title">${note.title || '无标题'}</div>
                <span class="note-category">${categoryInfo.label}</span>
                ${tags.slice(0, 2).map(t => `<span class="note-category">${t}</span>`).join('')}
              </div>
            </div>
            <div class="note-content">${note.content || '无内容'}</div>
            <div class="note-footer">
              <span>📅 ${date}</span>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // 过滤笔记
    function filterNotes(category) {
      currentNoteFilter = category;
      document.querySelectorAll('#noteCategoryTabs .filter-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      renderNoteList();
    }
    
    // 显示添加笔记模态框
    function showAddNoteModal() {
      document.getElementById('addNoteModal').classList.add('show');
    }
    
    // 关闭笔记模态框
    function closeNoteModal() {
      document.getElementById('addNoteModal').classList.remove('show');
      document.getElementById('noteForm').reset();
    }
    
    // 保存笔记
    async function saveNote() {
      const data = {
        title: document.getElementById('noteTitle').value,
