<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💾 缓存管理</title>
  <style>
    :root {
      --bg: #f6f8fa; --bg-secondary: #ffffff; --bg-tertiary: #f3f4f6;
      --border: #d0d7de; --border-light: #e5e7eb;
      --text: #24292f; --text-secondary: #57606a; --text-muted: #6e7781;
      --accent: #0969da; --accent-hover: #0550ae;
      --success: #1a7f37; --warning: #9a6700; --danger: #cf222e;
      --purple: #8250df; --pink: #bf3989;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 12px; height: 100vh; overflow: hidden; }
    
    /* 导航栏 */
    .nav-bar{position:fixed;top:0;left:0;right:0;height:40px;background:#24292f;display:flex;align-items:center;padding:0 16px;gap:4px;z-index:9999}
    .nav-bar span{color:#fff;font-weight:600;font-size:14px;margin-right:16px}
    .nav-bar a{color:#8b949e;font-size:13px;padding:6px 14px;border-radius:4px;text-decoration:none}
    .nav-bar a:hover{background:rgba(255,255,255,0.1);color:#fff}
    .nav-bar a.on{background:#0969da;color:#fff}
    
    .main { display: flex; height: calc(100vh - 40px); margin-top: 40px; }
    .sidebar { width: 280px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sidebar-header { padding: 12px 16px; background: var(--bg-tertiary); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .sidebar-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .btn { padding: 6px 12px; border: 1px solid var(--border); background: var(--bg); border-radius: 6px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
    .btn:hover { border-color: var(--accent); background: var(--bg-tertiary); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn.danger { background: var(--danger); border-color: var(--danger); color: white; }
    .btn-sm { padding: 4px 8px; font-size: 11px; }
    .sidebar-scroll { flex: 1; overflow-y: auto; padding: 8px; }
    .spacer { flex: 1; }
    
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .toolbar { padding: 12px 16px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
    .toolbar-group { display: flex; gap: 8px; }
    .content-area { flex: 1; overflow: hidden; }
    
    .cache-file-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .cache-file-item:hover { background: var(--bg-tertiary); }
    .cache-file-item.active { background: #ddf4ff; border: 1px solid var(--accent); }
    .cache-file-icon { font-size: 16px; }
    .cache-file-info { flex: 1; }
    .cache-file-name { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
    .cache-file-meta { font-size: 10px; color: var(--text-muted); }
    
    textarea { width: 100%; height: 100%; border: none; padding: 16px; font-family: 'Monaco', 'Consolas', 'Courier New', monospace; font-size: 13px; line-height: 1.6; resize: none; background: var(--bg-secondary); color: var(--text); outline: none; }
    
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div class="nav-bar">
  <a href="javascript:void(0)" onclick="var modal = document.getElementById('settingsModal'); if (modal) modal.classList.add('show'); else alert('请在小说管理页面使用设置功能');">⚙️ 设置</a>
  <a href="/novel/">📚 小说管理</a>
  <a href="/auto.html">⚙️ 自动化</a>
  <a href="/experience.html">🧠 经验</a>
  <a href="/cache.html" class="on">💾 缓存</a>
  <a href="/">🎯 原生界面</a>
</div>
  <div class="main">
    <!-- 左侧文件列表 -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">💾 缓存文件</span>
        <button class="btn btn-sm" onclick="refreshCacheList()">🔄</button>
      </div>
      <div class="sidebar-scroll" id="cacheFileList">
        <div class="empty-state">
          <div class="empty-icon">📂</div>
          <div>加载中...</div>
        </div>
      </div>
    </div>
    
    <!-- 右侧编辑器 -->
    <div class="content">
      <div class="toolbar">
        <div class="toolbar-group">
          <button class="btn btn-sm" onclick="saveCacheFile()">💾 保存</button>
          <button class="btn btn-sm" onclick="formatCacheJson()">🔧 格式化</button>
          <button class="btn btn-sm" onclick="compactCacheJson()">📦 压缩</button>
        </div>
        <div class="toolbar-group">
          <button class="btn btn-sm danger" onclick="deleteCacheFile()">🗑️ 删除</button>
          <button class="btn btn-sm" onclick="downloadCacheFile()">📥 下载</button>
        </div>
        <div class="spacer"></div>
        <div class="toolbar-group">
          <span id="cacheFileInfo" style="color: var(--text-muted);">未选择文件</span>
        </div>
      </div>
      
      <div class="content-area">
        <textarea id="cacheEditor" placeholder="选择左侧缓存文件进行编辑..." spellcheck="false"></textarea>
      </div>
    </div>
  </div>

  <script>
    // Gateway认证token
    const GATEWAY_TOKEN = 'e1647cdb-1b80-4eee-a975-7599160cc89b';
    const API_BASE = '/api/novel';
    
    // API请求封装
    async function api(endpoint, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GATEWAY_TOKEN}`,
        ...(options.headers || {})
      };
      const res = await fetch(API_BASE + endpoint, { ...options, headers });
      return res.json();
    }
    
    let currentFile = null;
    let cacheFiles = [];

    // 加载缓存文件列表
    async function refreshCacheList() {
      const listEl = document.getElementById('cacheFileList');
      listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div><div>加载中...</div></div>';
      
      try {
        const result = await api('/cache/files');
        
        if (result.success) {
          cacheFiles = result.data || [];
          renderCacheList();
        } else {
          listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><div>加载失败</div></div>';
        }
      } catch (err) {
        listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><div>加载失败: ' + err.message + '</div></div>';
      }
    }

    // 渲染缓存文件列表
    function renderCacheList() {
      const listEl = document.getElementById('cacheFileList');
      
      if (cacheFiles.length === 0) {
        listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div><div>暂无缓存文件</div></div>';
        return;
      }
      
      listEl.innerHTML = cacheFiles.map(file => `
        <div class="cache-file-item ${currentFile === file.name ? 'active' : ''}" onclick="selectCacheFile('${file.name}')">
          <span class="cache-file-icon">📄</span>
          <div class="cache-file-info">
            <div class="cache-file-name">${file.name}</div>
            <div class="cache-file-meta">${formatSize(file.size)} · ${formatDate(file.mtime)}</div>
          </div>
        </div>
      `).join('');
    }

    // 选择缓存文件
    async function selectCacheFile(filename) {
      currentFile = filename;
      renderCacheList();
      
      try {
        const result = await api(`/cache/file?name=${encodeURIComponent(filename)}`);
        
        if (result.success) {
          document.getElementById('cacheEditor').value = result.data.content || '';
          document.getElementById('cacheFileInfo').textContent = `${filename} (${formatSize(result.data.size || 0)})`;
        } else {
          alert('读取文件失败: ' + (result.error || '未知错误'));
        }
      } catch (err) {
        alert('读取文件失败: ' + err.message);
      }
    }

    // 保存缓存文件
    async function saveCacheFile() {
      if (!currentFile) {
        alert('请先选择文件');
        return;
      }
      
      const content = document.getElementById('cacheEditor').value;
      
      try {
        const result = await api(`/cache/file?name=${encodeURIComponent(currentFile)}`, {
          method: 'POST',
          body: JSON.stringify({ content })
        });
        
        if (result.success) {
          alert('✅ 保存成功');
          refreshCacheList();
        } else {
          alert('❌ 保存失败: ' + (result.error || '未知错误'));
        }
      } catch (err) {
        alert('❌ 保存失败: ' + err.message);
      }
    }

    // 格式化JSON
    function formatCacheJson() {
      const editor = document.getElementById('cacheEditor');
      try {
        const obj = JSON.parse(editor.value);
        editor.value = JSON.stringify(obj, null, 2);
      } catch (err) {
        alert('JSON格式错误: ' + err.message);
      }
    }

    // 压缩JSON
    function compactCacheJson() {
      const editor = document.getElementById('cacheEditor');
      try {
        const obj = JSON.parse(editor.value);
        editor.value = JSON.stringify(obj);
      } catch (err) {
        alert('JSON格式错误: ' + err.message);
      }
    }

    // 删除缓存文件
    async function deleteCacheFile() {
      if (!currentFile) {
        alert('请先选择文件');
        return;
      }
      
      if (!confirm(`确定要删除 ${currentFile} 吗？`)) return;
      
      try {
        const result = await api(`/cache/file?name=${encodeURIComponent(currentFile)}`, {
          method: 'DELETE'
        });
        
        if (result.success) {
          alert('✅ 删除成功');
          currentFile = null;
          document.getElementById('cacheEditor').value = '';
          document.getElementById('cacheFileInfo').textContent = '未选择文件';
          refreshCacheList();
        } else {
          alert('❌ 删除失败: ' + (result.error || '未知错误'));
        }
      } catch (err) {
        alert('❌ 删除失败: ' + err.message);
      }
    }

    // 下载缓存文件
    function downloadCacheFile() {
      if (!currentFile) {
        alert('请先选择文件');
        return;
      }
      
      const content = document.getElementById('cacheEditor').value;
      const blob = new Blob([content], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = currentFile;
      a.click();
      URL.revokeObjectURL(url);
    }

    // 格式化文件大小
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // 格式化日期
    function formatDate(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    // 初始化
    refreshCacheList();
  </script>
</body>
</html>
