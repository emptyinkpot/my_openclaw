<style>
/* 独立设置弹窗样式 - 优化版 */
#globalSettingsModal {
  display: none;

  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 2147483647; /* 最大z-index，确保在最上层 */
  align-items: center;
  justify-content: center;
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
#globalSettingsModal.show {
  display: flex;
}
#globalSettingsModal * {
  box-sizing: border-box;
}
#globalSettingsModal .modal-content {
  background: #ffffff;
  border: 1px solid #d0d7de;
  border-radius: 8px;
  width: 90%;
  max-width: 700px;
  max-height: 85vh;

  flex-direction: column;

#globalSettingsModal .modal-header {
  padding: 12px 16px;
  border-bottom: 1px solid #d0d7de;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #ffffff;
  flex-shrink: 0;
}
#globalSettingsModal .modal-header h3 {
  margin: 0;
  font-size: 16px;
  color: #24292f;
  font-weight: 600;
}
#globalSettingsModal .modal-body {
  padding: 16px;
  overflow-y: auto;
  flex: 1;
  background: #f6f8fa;
}
#globalSettingsModal .modal-footer {
  padding: 12px 16px;
  border-top: 1px solid #d0d7de;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  background: #ffffff;
  flex-shrink: 0;
}
#globalSettingsModal .btn {
  padding: 6px 12px;
  border: 1px solid #d0d7de;
  background: #f6f8fa;
  color: #24292f;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
#globalSettingsModal .btn:hover {
  border-color: #0969da;
  background: #f3f4f6;
}
#globalSettingsModal .btn.primary {
  background: #0969da;
  border-color: #0969da;
  color: #fff;
}
#globalSettingsModal .btn.primary:hover {
  background: #0550ae;
}
#globalSettingsModal .settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
#globalSettingsModal .settings-section {
  background: #ffffff;
  border: 1px solid #d0d7de;
  border-radius: 6px;
  padding: 12px;
}
#globalSettingsModal .settings-section h4 {
  font-size: 12px;
  margin-bottom: 10px;
  color: #57606a;
  text-transform: uppercase;
  margin-top: 0;
  font-weight: 600;
}
#globalSettingsModal .form-group {
  margin-bottom: 10px;
}
#globalSettingsModal .form-label {
  display: block;
  font-size: 11px;
  color: #6e7781;
  margin-bottom: 4px;
}
#globalSettingsModal .form-input {
  width: 100%;
  padding: 6px 8px;
  background: #ffffff;
  border: 1px solid #d0d7de;
  border-radius: 4px;
  color: #24292f;
  font-size: 11px;
  box-sizing: border-box;
  font-family: inherit;
}
#globalSettingsModal .form-input:focus {
  outline: none;
  border-color: #0969da;
  box-shadow: 0 0 0 3px rgba(9,105,218,0.1);
}
#globalSettingsModal .status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 4px;
}
#globalSettingsModal .status-dot.online {
  background: #1a7f37;
  box-shadow: 0 0 0 2px rgba(26, 127, 55, 0.2);
}
</style>

<!-- 全局设置模态框 -->
<div id="globalSettingsModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>⚙️ 系统设置</h3>
      <button class="btn" onclick="closeGlobalSettingsModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="settings-grid">
        <div class="settings-section">
          <h4>🗄️ 数据库配置</h4>
          <div style="margin-bottom: 16px; padding: 12px; background: #f3f4f6; border-radius: 6px;">
            <div style="display: flex; align-items: center; gap: 8px;">
              <span class="status-dot online" id="globalSettingsDbStatusDot"></span>
              <span id="globalSettingsDbStatusText">数据库已连接</span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">主机地址</label>
            <input type="text" class="form-input" id="globalDbHost" value="sh-cynosdbmysql-grp-1kbg1xh0.sql.tencentcdb.com">
          </div>
          <div class="form-group">
            <label class="form-label">端口</label>
            <input type="text" class="form-input" id="globalDbPort" value="22295">
          </div>
          <div class="form-group">
            <label class="form-label">数据库名</label>
            <input type="text" class="form-input" id="globalDbName" value="cloudbase-4glvyyq9f61b19cd">
          </div>
          <div class="form-group">
            <label class="form-label">用户名</label>
            <input type="text" class="form-input" id="globalDbUser" value="openclaw">
          </div>
          <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" class="form-input" id="globalDbPass" value="********">
          </div>
          <button class="btn primary" style="width: 100%;" onclick="testGlobalDBConnection()">🔗 测试连接</button>
        </div>
        
        <div class="settings-section">
          <h4>🤖 AI配置</h4>
          <div class="form-group">
            <label class="form-label">AI提供商</label>
            <select class="form-input" id="globalAiProvider">
              <option value="openai">OpenAI</option>
              <option value="claude">Claude</option>
              <option value="gemini">Gemini</option>
              <option value="local">本地模型</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">API Key</label>
            <input type="password" class="form-input" id="globalAiApiKey" placeholder="sk-...">
          </div>
          <div class="form-group">
            <label class="form-label">模型</label>
            <select class="form-input" id="globalAiModel">
              <option value="gpt-4">GPT-4</option>
              <option value="gpt-3.5">GPT-3.5</option>
              <option value="claude-3">Claude 3</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">生成温度 (0-1)</label>
            <input type="range" class="form-input" min="0" max="1" step="0.1" value="0.7" id="globalAiTemp">
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeGlobalSettingsModal()">取消</button>
      <button class="btn" onclick="resetGlobalSettings()">🔄 重置</button>
      <button class="btn primary" onclick="saveGlobalSettings()">💾 保存设置</button>
    </div>
  </div>
</div>

<script>
// 全局设置弹窗功能（独立版）
if (typeof closeGlobalSettingsModal === 'undefined') {
  window.closeGlobalSettingsModal = function() {
    const modal = document.getElementById('globalSettingsModal');
    if (modal) {
      modal.classList.remove('show');
    }
  }
}

if (typeof testGlobalDBConnection === 'undefined') {
  window.testGlobalDBConnection = function() {
    alert('🔗 测试数据库连接...\n（模拟成功）');
  }
}

if (typeof saveGlobalSettings === 'undefined') {
  window.saveGlobalSettings = function() {
    alert('💾 设置已保存！');
    if (typeof closeGlobalSettingsModal === 'function') {
      closeGlobalSettingsModal();
    }
  }
}

if (typeof resetGlobalSettings === 'undefined') {
  window.resetGlobalSettings = function() {
    if (confirm('确定重置所有设置?')) {
      alert('🔄 已重置！');
    }
  }
}

// 点击弹窗外部关闭
(function() {
  let handlerAdded = false;
  if (!handlerAdded) {
    document.addEventListener('click', function(e) {
      const modal = document.getElementById('globalSettingsModal');
      if (modal && e.target === modal) {
        if (typeof closeGlobalSettingsModal === 'function') {
          closeGlobalSettingsModal();
        }
      }
    });
    
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        if (typeof closeGlobalSettingsModal === 'function') {
          closeGlobalSettingsModal();
        }
      }
    });
    
    handlerAdded = true;
  }
})();
</script>
