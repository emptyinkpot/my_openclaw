<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 自动发布作品 - 番茄小说</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0f172a;
      --bg-secondary: #1e293b;
      --card: #1e293b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --border: #334155;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .btn {
      padding: 10px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn.secondary { background: var(--bg-secondary); border: 1px solid var(--border); }
    .btn.secondary:hover { background: #334155; }
    .btn.success { background: var(--success); }
    .btn.success:hover { background: #16a34a; }
    
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    
    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    
    .form-select, .form-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
    }
    
    .form-select:focus, .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .status-badge.idle { background: #334155; color: var(--text-muted); }
    .status-badge.running { background: rgba(59, 130, 246, 0.2); color: var(--accent); }
    .status-badge.success { background: rgba(34, 197, 94, 0.2); color: var(--success); }
    .status-badge.error { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    
    .progress-container {
      margin-top: 16px;
    }
    
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.3s;
    }
    
    .log-container {
      margin-top: 16px;
      background: var(--bg);
      border-radius: 8px;
      padding: 12px;
      font-family: monospace;
      font-size: 13px;
      max-height: 300px;
      overflow-y: auto;
    }
    
    .log-line {
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    
    .log-line:last-child { border-bottom: none; }
    
    .log-time {
      color: var(--text-muted);
      margin-right: 8px;
    }
    
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 24px;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      z-index: 9999;
      animation: slideIn 0.3s ease;
    }
    
    .toast.info { background: var(--accent); }
    .toast.success { background: var(--success); }
    .toast.warning { background: var(--warning); }
    .toast.error { background: var(--danger); }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .nav-bar {
      background: linear-gradient(135deg, #24292f 0%, #1c2128 100%);
      padding: 12px 24px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    
    .nav-bar a {
      color: #8b949e;
      font-size: 14px;
      padding: 6px 14px;
      border-radius: 6px;
      text-decoration: none;
      transition: all 0.2s;
    }
    
    .nav-bar a:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .nav-bar a.on { background: #0969da; color: #fff; }
  </style>
</head>
<body>
  <div class="nav-bar">
    <a href="/novel/">📚 小说管理</a>
    <a href="/publish.html" class="on">🚀 自动发布</a>
    <a href="/cache-manage.html">💾 缓存管理</a>
    <a href="/logs.html">📋 日志查看</a>
    <a href="/project-structure.html">🏗️ 项目结构</a>
    <a href="/">🎯 原生界面</a>
  </div>

  <div class="container">
    <div class="header">
      <h1>🚀 自动发布作品 - 番茄小说</h1>
      <div class="status-badge" id="statusBadge">idle</div>
    </div>

    <div class="grid">
      <!-- 左侧：发布配置 -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">📝 发布配置</h2>
        </div>
        
        <div class="form-group">
          <label class="form-label">选择作品</label>
          <select class="form-select" id="workSelect" onchange="loadChapters()">
            <option value="">-- 请选择作品 --</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label">选择章节</label>
          <select class="form-select" id="chapterSelect">
            <option value="">-- 自动发布下一章 --</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label" style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="dryRun" checked>
            模拟模式（不实际发布）
          </label>
        </div>
        
        <div class="form-group">
          <label class="form-label" style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="headless" checked>
            无头模式（不显示浏览器）
          </label>
        </div>
        
        <button class="btn" id="publishBtn" onclick="startPublish()" style="width: 100%;">
          🚀 开始发布
        </button>
      </div>

      <!-- 右侧：进度与日志 -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">📊 发布进度</h2>
          <button class="btn secondary" onclick="clearLogs()">🗑️ 清空日志</button>
        </div>
        
        <div class="progress-container" id="progressContainer" style="display: none;">
          <div class="form-label" id="progressLabel">准备中...</div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
          </div>
        </div>
        
        <div class="log-container" id="logContainer">
          <div class="log-line">
            <span class="log-time">[系统]</span>
            <span>准备就绪，请选择作品开始发布</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // API 封装
    async function api(url, options = {}) {
      const res = await fetch('/api/novel' + url, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options
      });
      return res.json();
    }

    // Toast 通知
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // 日志
    function addLog(message, type = 'info') {
      const container = document.getElementById('logContainer');
      const time = new Date().toLocaleTimeString();
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `<span class="log-time">[${time}]</span> <span>${message}</span>`;
      container.appendChild(line);
      container.scrollTop = container.scrollHeight;
    }

    function clearLogs() {
      document.getElementById('logContainer').innerHTML = '<div class="log-line"><span class="log-time">[系统]</span> <span>日志已清空</span></div>';
    }

    // 加载作品列表
    async function loadWorks() {
      try {
        addLog('正在加载作品列表...');
        const result = await api('/publish/works');
        if (result.success && result.data) {
          const select = document.getElementById('workSelect');
          select.innerHTML = '<option value="">-- 请选择作品 --</option>';
          result.data.forEach(work => {
            const option = document.createElement('option');
            option.value = work.id;
            option.textContent = work.title || `作品 #${work.id}`;
            select.appendChild(option);
          });
          addLog(`作品列表加载完成，共 ${result.data.length} 个作品`);
        }
      } catch (e) {
        addLog('加载作品列表失败: ' + e.message, 'error');
        showToast('加载作品列表失败', 'error');
      }
    }

    // 加载章节列表
    async function loadChapters() {
      const workId = document.getElementById('workSelect').value;
      if (!workId) {
        document.getElementById('chapterSelect').innerHTML = '<option value="">-- 自动发布下一章 --</option>';
        return;
      }

      try {
        addLog(`正在加载作品 #${workId} 的章节列表...`);
        const result = await api(`/publish/works/${workId}/chapters`);
        if (result.success && result.data) {
          const select = document.getElementById('chapterSelect');
          select.innerHTML = '<option value="">-- 自动发布下一章 --</option>';
          result.data.forEach(chapter => {
            const option = document.createElement('option');
            option.value = chapter.chapter_number;
            option.textContent = `第 ${chapter.chapter_number} 章: ${chapter.title || '无标题'}`;
            select.appendChild(option);
          });
          addLog(`章节列表加载完成，共 ${result.data.length} 章`);
        }
      } catch (e) {
        addLog('加载章节列表失败: ' + e.message, 'error');
        showToast('加载章节列表失败', 'error');
      }
    }

    // 开始发布
    async function startPublish() {
      const workId = document.getElementById('workSelect').value;
      const chapterNumber = document.getElementById('chapterSelect').value;
      const dryRun = document.getElementById('dryRun').checked;
      const headless = document.getElementById('headless').checked;

      if (!workId) {
        showToast('请先选择作品', 'warning');
        return;
      }

      const btn = document.getElementById('publishBtn');
      btn.disabled = true;
      btn.textContent = '🚀 发布中...';
      
      document.getElementById('statusBadge').textContent = 'running';
      document.getElementById('statusBadge').className = 'status-badge running';
      document.getElementById('progressContainer').style.display = 'block';

      addLog('开始发布任务...');
      addLog(`作品ID: ${workId}, 章节: ${chapterNumber || '自动'}, 模拟模式: ${dryRun}`);

      try {
        const result = await api('/publish', {
          method: 'POST',
          body: JSON.stringify({
            workId,
            chapterNumber: chapterNumber ? parseInt(chapterNumber, 10) : undefined,
            dryRun,
            headless
          })
        });

        if (result.success) {
          addLog('发布任务已启动: ' + result.message);
          showToast('发布任务已启动！', 'success');
          
          // 模拟进度更新
          simulateProgress();
        } else {
          throw new Error(result.error || '发布失败');
        }
      } catch (e) {
        addLog('发布失败: ' + e.message, 'error');
        showToast('发布失败: ' + e.message, 'error');
        resetUI();
      }
    }

    // 模拟进度（临时方案，后续应使用 SSE）
    function simulateProgress() {
      const steps = [
        '初始化发布流程...',
        '获取作品信息...',
        '自动匹配账号...',
        '获取番茄最新章节...',
        '从数据库获取章节内容...',
        '准备发布...',
        '发布中...',
        '完成！'
      ];

      let currentStep = 0;
      const interval = setInterval(() => {
        if (currentStep >= steps.length) {
          clearInterval(interval);
          document.getElementById('progressFill').style.width = '100%';
          document.getElementById('progressLabel').textContent = steps[steps.length - 1];
          document.getElementById('statusBadge').textContent = 'success';
          document.getElementById('statusBadge').className = 'status-badge success';
          addLog('发布完成！', 'success');
          showToast('发布完成！', 'success');
          resetUI();
          return;
        }

        const percent = Math.round((currentStep / (steps.length - 1)) * 100);
        document.getElementById('progressFill').style.width = percent + '%';
        document.getElementById('progressLabel').textContent = steps[currentStep];
        addLog(steps[currentStep]);
        currentStep++;
      }, 800);
    }

    function resetUI() {
      const btn = document.getElementById('publishBtn');
      btn.disabled = false;
      btn.textContent = '🚀 开始发布';
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      loadWorks();
    });
  </script>
</body>
</html>
