<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 AI模型管理中心</title>
  <style>
    :root {
      --bg: #f6f8fa; --bg-secondary: #ffffff; --bg-tertiary: #f3f4f6;
      --border: #d0d7de; --border-light: #e5e7eb;
      --text: #24292f; --text-secondary: #57606a; --text-muted: #6e7781;
      --accent: #0969da; --accent-hover: #0550ae;
      --success: #1a7f37; --warning: #9a6700; --danger: #cf222e;
      --purple: #8250df; --pink: #bf3989;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; height: 100vh; overflow: hidden; }
    
    /* 头部 */
    .header { height: 56px; background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%); color: white; display: flex; align-items: center; padding: 0 20px; gap: 16px; }
    .header-title { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    
    /* 导航标签 */
    .nav-tabs { display: flex; gap: 4px; margin-left: 20px; }
    .nav-tab { padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.15s; color: rgba(255,255,255,0.8); border: none; background: transparent; }
    .nav-tab:hover { background: rgba(255,255,255,0.1); color: white; }
    .nav-tab.active { background: rgba(255,255,255,0.2); color: white; }
    
    /* 主内容 */
    .main { height: calc(100vh - 56px); overflow: auto; padding: 20px; }
    
    /* 页面 */
    .page { display: none; }
    .page.active { display: block; }
    
    /* 卡片 */
    .card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .card-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
    
    /* 网格布局 */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    
    /* 按钮 */
    .btn { padding: 8px 16px; border: 1px solid var(--border); background: var(--bg); border-radius: 6px; font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
    .btn:hover { border-color: var(--accent); background: var(--bg-tertiary); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn.primary:hover { background: var(--accent-hover); }
    .btn.success { background: var(--success); border-color: var(--success); color: white; }
    .btn.danger { background: var(--danger); border-color: var(--danger); color: white; }
    .btn-sm { padding: 4px 12px; font-size: 11px; }
    
    /* 表格 */
    .table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .table th { text-align: left; padding: 10px; background: var(--bg-tertiary); border-bottom: 1px solid var(--border); font-weight: 600; color: var(--text-secondary); }
    .table td { padding: 10px; border-bottom: 1px solid var(--border-light); }
    .table tr:hover { background: var(--bg-tertiary); }
    
    /* 状态标签 */
    .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; }
    .badge-success { background: #dafbe1; color: var(--success); }
    .badge-warning { background: #fff8c5; color: var(--warning); }
    .badge-danger { background: #ffebe9; color: var(--danger); }
    .badge-info { background: #ddf4ff; color: var(--accent); }
    
    /* 表单 */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 100px; }
    
    /* 进度条 */
    .progress-bar { height: 8px; background: var(--bg-tertiary); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--purple)); border-radius: 4px; transition: width 0.3s; }
    
    /* 日志 */
    .log-container { background: #1a1a1a; color: #d4d4d4; padding: 12px; border-radius: 8px; font-family: 'Monaco', 'Consolas', monospace; font-size: 12px; line-height: 1.6; max-height: 300px; overflow: auto; white-space: pre-wrap; }
    
    /* 空状态 */
    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    
    /* 响应式 */
    @media (max-width: 900px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <!-- 头部 -->
  <div class="header">
    <div class="header-title">🤖 AI模型管理中心</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('models')">📦 本地模型</button>
      <button class="nav-tab" onclick="switchTab('finetune')">🔧 模型微调</button>
      <button class="nav-tab" onclick="switchTab('sandbox')">🔒 安全沙盒</button>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="main">
    <!-- 本地模型页面 -->
    <div class="page active" id="page-models">
      <div class="grid-2">
        <!-- Ollama -->
        <div class="card">
          <div class="card-title">🦙 Ollama 本地模型</div>
          <div class="card-subtitle">一键运行量化模型，低资源消耗</div>
          
          <div id="ollama-status" style="margin-bottom: 12px;">
            <span class="badge badge-warning">检查中...</span>
          </div>
          
          <div style="display: flex; gap: 8px; margin-bottom: 16px;">
            <input type="text" class="form-input" id="ollama-model-input" placeholder="输入模型名称 (如: llama3.2)" style="flex: 1;">
            <button class="btn primary" onclick="pullOllamaModel()">📥 拉取</button>
          </div>
          
          <table class="table">
            <thead>
              <tr>
                <th>模型</th>
                <th>大小</th>
                <th>量化</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="ollama-models">
              <tr><td colspan="4" class="empty">加载中...</td></tr>
            </tbody>
          </table>
        </div>

        <!-- vLLM -->
        <div class="card">
          <div class="card-title">⚡ vLLM 高性能推理</div>
          <div class="card-subtitle">生产级推理引擎，PagedAttention优化</div>
          
          <div id="vllm-status" style="margin-bottom: 12px;">
            <span class="badge badge-warning">检查中...</span>
          </div>
          
          <div class="form-group">
            <label class="form-label">模型路径</label>
            <input type="text" class="form-input" id="vllm-model-path" placeholder="/path/to/your/model">
          </div>
          
          <div class="form-group">
            <label class="form-label">GPU数量</label>
            <input type="number" class="form-input" id="vllm-gpu-count" value="1" min="1">
          </div>
          
          <button class="btn success" onclick="startVLLM()">🚀 启动 vLLM 服务</button>
        </div>
      </div>

      <!-- 模型测试 -->
      <div class="card">
        <div class="card-title">💬 模型测试</div>
        <div class="grid-2">
          <div>
            <div class="form-group">
              <label class="form-label">选择模型</label>
              <select class="form-select" id="test-model-select">
                <option value="">选择模型...</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">提示词</label>
              <textarea class="form-textarea" id="test-prompt" placeholder="输入测试提示词..."></textarea>
            </div>
            <button class="btn primary" onclick="testModel()">▶️ 运行测试</button>
          </div>
          <div>
            <label class="form-label">输出结果</label>
            <div class="log-container" id="test-output" style="min-height: 200px;">等待运行...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 模型微调页面 -->
    <div class="page" id="page-finetune">
      <div class="card">
        <div class="card-title">➕ 创建微调任务</div>
        <div class="grid-2">
          <div>
            <div class="form-group">
              <label class="form-label">任务名称</label>
              <input type="text" class="form-input" id="ft-name" placeholder="my-finetune-job">
            </div>
            <div class="form-group">
              <label class="form-label">基础模型</label>
              <select class="form-select" id="ft-base-model">
                <option value="">选择预训练模型...</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">数据集</label>
              <input type="text" class="form-input" id="ft-dataset" placeholder="HuggingFace数据集名称">
            </div>
          </div>
          <div>
            <div class="form-group">
              <label class="form-label">LoRA Rank (r)</label>
              <input type="number" class="form-input" id="ft-r" value="16" min="1" max="128">
            </div>
            <div class="form-group">
              <label class="form-label">LoRA Alpha</label>
              <input type="number" class="form-input" id="ft-alpha" value="16" min="1">
            </div>
            <div class="form-group">
              <label class="form-label">训练轮数 (Epochs)</label>
              <input type="number" class="form-input" id="ft-epochs" value="3" min="1">
            </div>
          </div>
        </div>
        <button class="btn primary" onclick="createTrainingJob()">🔧 创建训练任务</button>
      </div>

      <div class="card">
        <div class="card-title">📊 训练任务</div>
        <table class="table">
          <thead>
            <tr>
              <th>名称</th>
              <th>基础模型</th>
              <th>状态</th>
              <th>进度</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="training-jobs">
            <tr><td colspan="5" class="empty">暂无训练任务</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 安全沙盒页面 -->
    <div class="page" id="page-sandbox">
      <div class="grid-2">
        <div class="card">
          <div class="card-title">🔍 代码安全分析</div>
          <div class="form-group">
            <label class="form-label">代码语言</label>
            <select class="form-select" id="sandbox-language">
              <option value="python">Python</option>
              <option value="javascript">JavaScript</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">待分析代码</label>
            <textarea class="form-textarea" id="sandbox-code" placeholder="粘贴代码进行安全分析..." style="min-height: 200px; font-family: monospace;"></textarea>
          </div>
          <button class="btn primary" onclick="analyzeCode()">🔍 安全分析</button>
        </div>

        <div class="card">
          <div class="card-title">📋 分析结果</div>
          <div id="sandbox-result">
            <div class="empty">
              <div class="empty-icon">🔍</div>
              <div>等待代码分析...</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">⚙️ 沙盒配置</div>
        <div class="grid-3">
          <div class="form-group">
            <label class="form-label">沙盒提供商</label>
            <select class="form-select" id="sandbox-provider">
              <option value="local">本地 VM2</option>
              <option value="docker">Docker 容器</option>
              <option value="e2b">E2B 云端</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">AST静态检查</label>
            <select class="form-select" id="sandbox-ast">
              <option value="true">启用</option>
              <option value="false">禁用</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">危险模块 (逗号分隔)</label>
            <input type="text" class="form-input" id="sandbox-blocked" value="os,subprocess,socket,requests">
          </div>
        </div>
        <button class="btn" onclick="saveSandboxConfig()">💾 保存配置</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/ai-model/api';

    // 切换标签页
    function switchTab(tab) {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + tab).classList.add('active');
      
      // 加载对应数据
      if (tab === 'models') loadModels();
      if (tab === 'finetune') loadFineTuneData();
      if (tab === 'sandbox') loadSandboxConfig();
    }

    // 加载模型数据
    async function loadModels() {
      try {
        // 检查Ollama状态
        const statusRes = await fetch(`${API_BASE}/models/status`);
        const status = await statusRes.json();
        
        document.getElementById('ollama-status').innerHTML = 
          status.data.ollama ? '<span class="badge badge-success">● 已连接</span>' : '<span class="badge badge-danger">● 未连接</span>';
        document.getElementById('vllm-status').innerHTML = 
          status.data.vllm ? '<span class="badge badge-success">● 已连接</span>' : '<span class="badge badge-warning">● 未启动</span>';

        // 加载Ollama模型
        if (status.data.ollama) {
          const modelsRes = await fetch(`${API_BASE}/models/ollama`);
          const models = await modelsRes.json();
          
          if (models.success && models.data.length > 0) {
            document.getElementById('ollama-models').innerHTML = models.data.map(m => `
              <tr>
                <td>${m.name}</td>
                <td>${m.size}</td>
                <td>${m.quantization || '-'}</td>
                <td><button class="btn btn-sm" onclick="testOllamaModel('${m.name}')">测试</button></td>
              </tr>
            `).join('');
            
            // 更新测试选择框
            document.getElementById('test-model-select').innerHTML = 
              '<option value="">选择模型...</option>' + 
              models.data.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
          } else {
            document.getElementById('ollama-models').innerHTML = '<tr><td colspan="4" class="empty">暂无模型，请先拉取</td></tr>';
          }
        }
      } catch (err) {
        console.error('加载模型失败:', err);
      }
    }

    // 拉取Ollama模型
    async function pullOllamaModel() {
      const model = document.getElementById('ollama-model-input').value;
      if (!model) return alert('请输入模型名称');
      
      alert('开始拉取模型，请稍后...');
      try {
        const res = await fetch(`${API_BASE}/models/ollama/pull`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model })
        });
        const result = await res.json();
        if (result.success) {
          alert('✅ 模型拉取成功');
          loadModels();
        } else {
          alert('❌ ' + result.error);
        }
      } catch (err) {
        alert('❌ 拉取失败: ' + err.message);
      }
    }

    // 测试模型
    async function testModel() {
      const model = document.getElementById('test-model-select').value;
      const prompt = document.getElementById('test-prompt').value;
      
      if (!model || !prompt) return alert('请选择模型并输入提示词');
      
      document.getElementById('test-output').textContent = '运行中...';
      
      try {
        const res = await fetch(`${API_BASE}/models/ollama/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, prompt })
        });
        const result = await res.json();
        document.getElementById('test-output').textContent = result.data || result.error || '无输出';
      } catch (err) {
        document.getElementById('test-output').textContent = '错误: ' + err.message;
      }
    }

    // 加载微调数据
    async function loadFineTuneData() {
      try {
        // 加载基础模型列表
        const modelsRes = await fetch(`${API_BASE}/finetune/base-models`);
        const models = await modelsRes.json();
        if (models.success) {
          document.getElementById('ft-base-model').innerHTML = 
            '<option value="">选择预训练模型...</option>' +
            models.data.map(m => `<option value="${m.name}">${m.description} (${m.size})</option>`).join('');
        }
        
        // 加载任务列表
        const jobsRes = await fetch(`${API_BASE}/finetune/jobs`);
        const jobs = await jobsRes.json();
        if (jobs.success && jobs.data.length > 0) {
          document.getElementById('training-jobs').innerHTML = jobs.data.map(j => `
            <tr>
              <td>${j.name}</td>
              <td>${j.baseModel}</td>
              <td><span class="badge badge-${j.status === 'completed' ? 'success' : j.status === 'running' ? 'info' : j.status === 'failed' ? 'danger' : 'warning'}">${j.status}</span></td>
              <td>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${(j.progress.currentEpoch / j.progress.totalEpochs * 100) || 0}%"></div>
                </div>
                <small>${j.progress.currentEpoch}/${j.progress.totalEpochs} epochs</small>
              </td>
              <td>
                ${j.status === 'pending' ? `<button class="btn btn-sm primary" onclick="startTraining('${j.id}')">开始</button>` : ''}
                ${j.status === 'completed' ? `<button class="btn btn-sm" onclick="exportModel('${j.id}')">导出</button>` : ''}
              </td>
            </tr>
          `).join('');
        }
      } catch (err) {
        console.error('加载微调数据失败:', err);
      }
    }

    // 创建训练任务
    async function createTrainingJob() {
      const params = {
        name: document.getElementById('ft-name').value,
        baseModel: document.getElementById('ft-base-model').value,
        dataset: document.getElementById('ft-dataset').value,
        config: {
          r: parseInt(document.getElementById('ft-r').value),
          loraAlpha: parseInt(document.getElementById('ft-alpha').value),
          epochs: parseInt(document.getElementById('ft-epochs').value)
        }
      };
      
      if (!params.name || !params.baseModel || !params.dataset) {
        return alert('请填写完整信息');
      }
      
      try {
        const res = await fetch(`${API_BASE}/finetune/jobs`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(params)
        });
        const result = await res.json();
        if (result.success) {
          alert('✅ 训练任务创建成功');
          loadFineTuneData();
        } else {
          alert('❌ ' + result.error);
        }
      } catch (err) {
        alert('❌ 创建失败: ' + err.message);
      }
    }

    // 开始训练
    async function startTraining(jobId) {
      try {
        const res = await fetch(`${API_BASE}/finetune/jobs/${jobId}/start`, { method: 'POST' });
        const result = await res.json();
        if (result.success) {
          alert('✅ 训练已启动');
          loadFineTuneData();
        } else {
          alert('❌ ' + result.error);
        }
      } catch (err) {
        alert('❌ 启动失败: ' + err.message);
      }
    }

    // 代码安全分析
    async function analyzeCode() {
      const code = document.getElementById('sandbox-code').value;
      const language = document.getElementById('sandbox-language').value;
      
      if (!code) return alert('请输入代码');
      
      document.getElementById('sandbox-result').innerHTML = '<div class="empty">分析中...</div>';
      
      try {
        const res = await fetch(`${API_BASE}/sandbox/analyze`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, language })
        });
        const result = await res.json();
        
        if (result.success) {
          const data = result.data;
          let html = '';
          
          if (data.safe) {
            html = '<div style="color: var(--success); margin-bottom: 12px;">✅ 代码安全，未发现风险</div>';
          } else {
            html = '<div style="color: var(--danger); margin-bottom: 12px;">⚠️ 发现安全风险：</div>';
            html += '<ul style="margin-left: 20px; line-height: 2;">';
            data.threats.forEach(t => {
              html += `<li><strong>${t.type}</strong>: ${t.message} (第${t.line}行)</li>`;
            });
            html += '</ul>';
          }
          
          html += '<div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border);">';
          html += '<strong>导入模块:</strong> ' + (data.imports.join(', ') || '无') + '<br>';
          html += '<strong>函数调用:</strong> ' + (data.functionCalls.slice(0, 10).join(', ') || '无');
          html += '</div>';
          
          document.getElementById('sandbox-result').innerHTML = html;
        } else {
          document.getElementById('sandbox-result').innerHTML = '<div style="color: var(--danger);">分析失败: ' + result.error + '</div>';
        }
      } catch (err) {
        document.getElementById('sandbox-result').innerHTML = '<div style="color: var(--danger);">错误: ' + err.message + '</div>';
      }
    }

    // 初始化
    loadModels();
  </script>
</body>
</html>
