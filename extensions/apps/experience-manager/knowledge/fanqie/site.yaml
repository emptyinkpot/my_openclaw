# 番茄小说网站配置
# YAML 格式，便于人和程序读取

site:
  name: 番茄小说
  domain: fanqienovel.com
  urls:
    home: https://fanqienovel.com
    writer: https://fanqienovel.com/main/writer/book-manage
    chapter: https://fanqienovel.com/main/writer/chapter-edit

auth:
  type: cookies  # 登录状态存储方式（Cookies 为主）
  keys:
    - sessionid
    - csrf_token

browser:
  viewport: null
  args:
    - --start-maximized
    - --disable-blink-features=AutomationControlled

selectors:
  # 核心选择器
  work_list:
    container: '[class*="book-list"], [class*="work-list"]'
    item: '[class*="book-item"], [class*="work-item"]'
  
  chapter_list:
    container: '[class*="chapter-list"]'
    item: '[class*="chapter-item"]'
  
  editor:
    container: '[class*="editor"]'
    content: '[contenteditable="true"], textarea'
  
  button:
    save: 'button:has-text("保存")'
    publish: 'button:has-text("发布")'

scroll:
  delay: 100
  distance: 100
  max_attempts: 50
