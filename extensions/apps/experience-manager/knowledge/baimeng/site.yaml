# 白梦写作网站配置
# YAML 格式，便于人和程序读取

site:
  name: 白梦写作
  domain: baimengxiezuo.com
  urls:
    home: https://baimengxiezuo.com
    library: https://baimengxiezuo.com/zh-Hans/library/
    editor: https://baimengxiezuo.com/zh-Hans/editor/

auth:
  type: localStorage  # 登录状态存储方式
  keys:  # 关键 token 键名
    - token
    - user
    - auth

browser:
  # 浏览器启动配置
  viewport: null  # 让浏览器自动调整
  args:
    - --start-maximized
    - --disable-blink-features=AutomationControlled

selectors:
  # 核心选择器
  sidebar:
    container: '[class*="sidebar"]'
    item: '[class*="cursor-pointer"]'
    folder: '[class*="chevron"], [class*="arrow"], svg'
  
  main:
    container: '[class*="main"]'
    content: '[class*="content"]'
  
  button:
    copy: 'button:has-text("复制")'
    save: 'button:has-text("保存")'

scroll:
  # 滚动配置
  delay: 80  # 滚动间隔(ms)
  distance: 80  # 每次滚动距离(px)
  max_attempts: 50  # 最大滚动次数

ai:
  # AI 功能配置
  input_selector: '[contenteditable="true"], textarea'
  send_button: 'button:has-text("发送"), button:has-text("✈️")'
  model_selector: '[class*="model"] select, [class*="专业模型"]'
